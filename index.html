<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Text Analysis | Study Guide</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>

    <style>
        /* Custom scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Add dark mode scrollbars */
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        
        .hero-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* * PREMIUM DARK MODE ENHANCEMENTS */
        html.dark body { 
            background-color: #020617 !important; 
            color: #cbd5e1 !important; 
        }
        
        html.dark .hero-pattern {
            background-color: #020617 !important;
            background-image: radial-gradient(#1e293b 1px, transparent 1px) !important;
        }

        html.dark .glass-panel {
            background: rgba(2, 6, 23, 0.85) !important;
            border-bottom: 1px solid rgba(30, 41, 59, 0.8) !important; 
        }
        
        html.dark .bg-white { background-color: #0f172a !important; border-color: #1e293b !important; }
        html.dark .bg-slate-50, 
        html.dark .bg-slate-50\/50, 
        html.dark .bg-slate-50\/70 { background-color: #111827 !important; border-color: #1f2937 !important; }
        html.dark .bg-slate-100 { background-color: #1e293b !important; border-color: #334155 !important; }
        html.dark .bg-slate-200 { background-color: #334155 !important; }
        html.dark .bg-slate-800 { background-color: #0f172a !important; border-color: #1e293b !important; } 
        html.dark .bg-slate-700\/50 { background-color: #1e293b !important; border-color: #334155 !important; }
        html.dark .bg-white\/20 { background-color: rgba(255,255,255,0.1) !important; }
        
        html.dark .hover\:bg-slate-50:hover { background-color: #1e293b !important; }
        html.dark .hover\:border-emerald-200:hover { border-color: rgba(16, 185, 129, 0.5) !important; }
        html.dark .hover\:border-indigo-200:hover { border-color: rgba(99, 102, 241, 0.5) !important; }
        html.dark .hover\:border-rose-200:hover { border-color: rgba(244, 63, 94, 0.5) !important; }
        html.dark .hover\:border-amber-200:hover { border-color: rgba(245, 158, 11, 0.5) !important; }
        html.dark .hover\:border-slate-200:hover { border-color: #475569 !important; }

        html.dark .text-slate-900, html.dark .text-slate-800 { color: #f8fafc !important; }
        html.dark .text-slate-700 { color: #e2e8f0 !important; }
        html.dark .text-slate-600 { color: #cbd5e1 !important; }
        html.dark .text-slate-500, html.dark .text-slate-400 { color: #94a3b8 !important; }
        html.dark .text-slate-300 { color: #cbd5e1 !important; }
        html.dark .text-slate-200\/50 { color: rgba(148, 163, 184, 0.2) !important; } 
        
        html.dark .border-slate-100 { border-color: #1e293b !important; }
        html.dark .border-slate-200, 
        html.dark .border-slate-200\/60, 
        html.dark .border-slate-200\/85 { border-color: #334155 !important; }
        html.dark .border-slate-300, 
        html.dark .border-slate-400 { border-color: #475569 !important; }
        html.dark .border-l-4 { border-left-width: 4px !important; }
        html.dark .border-t-4 { border-top-width: 4px !important; }
        
        html.dark .bg-emerald-50, html.dark .bg-emerald-50\/25, html.dark .bg-emerald-50\/50, html.dark .bg-emerald-100 { background-color: rgba(16, 185, 129, 0.1) !important; border-color: rgba(16, 185, 129, 0.2) !important; }
        html.dark .text-emerald-950, html.dark .text-emerald-900, html.dark .text-emerald-800 { color: #6ee7b7 !important; }
        html.dark .text-emerald-700 { color: #34d399 !important; }
        html.dark .border-emerald-100, html.dark .border-emerald-200, html.dark .border-emerald-100\/30, html.dark .border-emerald-100\/50 { border-color: rgba(16, 185, 129, 0.25) !important; }
        html.dark .border-emerald-500, html.dark .border-emerald-400\/60 { border-color: rgba(16, 185, 129, 0.4) !important; }
        
        html.dark .bg-indigo-50, html.dark .bg-indigo-50\/25, html.dark .bg-indigo-50\/50, html.dark .bg-indigo-100 { background-color: rgba(99, 102, 241, 0.1) !important; border-color: rgba(99, 102, 241, 0.2) !important; }
        html.dark .text-indigo-950, html.dark .text-indigo-900, html.dark .text-indigo-800 { color: #a5b4fc !important; }
        html.dark .text-indigo-700 { color: #818cf8 !important; }
        html.dark .border-indigo-100, html.dark .border-indigo-200, html.dark .border-indigo-100\/30, html.dark .border-indigo-100\/50 { border-color: rgba(99, 102, 241, 0.25) !important; }
        html.dark .border-indigo-500, html.dark .border-indigo-400\/60 { border-color: rgba(99, 102, 241, 0.4) !important; }

        html.dark .bg-rose-50, html.dark .bg-rose-50\/25, html.dark .bg-rose-50\/50, html.dark .bg-rose-100 { background-color: rgba(244, 63, 94, 0.1) !important; border-color: rgba(244, 63, 94, 0.2) !important; }
        html.dark .text-rose-950, html.dark .text-rose-900, html.dark .text-rose-800 { color: #fda4af !important; }
        html.dark .text-rose-700 { color: #fb7185 !important; }
        html.dark .border-rose-100, html.dark .border-rose-200, html.dark .border-rose-100\/30, html.dark .border-rose-100\/50 { border-color: rgba(244, 63, 94, 0.25) !important; }
        html.dark .border-rose-500, html.dark .border-rose-400\/60 { border-color: rgba(244, 63, 94, 0.4) !important; }

        html.dark .bg-amber-50, html.dark .bg-amber-50\/25, html.dark .bg-amber-50\/50, html.dark .bg-amber-100 { background-color: rgba(245, 158, 11, 0.1) !important; border-color: rgba(245, 158, 11, 0.2) !important; }
        html.dark .text-amber-955, html.dark .text-amber-950, html.dark .text-amber-900, html.dark .text-amber-800 { color: #fcd34d !important; }
        html.dark .text-amber-700 { color: #fbbf24 !important; }
        html.dark .border-amber-100, html.dark .border-amber-200, html.dark .border-amber-100\/30, html.dark .border-amber-100\/50 { border-color: rgba(245, 158, 11, 0.25) !important; }
        html.dark .border-amber-500, html.dark .border-amber-400\/60 { border-color: rgba(245, 158, 11, 0.4) !important; }

        html.dark .text-sky-700 { color: #38bdf8 !important; }
        html.dark .text-purple-700 { color: #c084fc !important; }
        html.dark .text-blue-500 { color: #60a5fa !important; }
        
        html.dark .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.8) !important; }
        html.dark .shadow-md { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.8), 0 2px 4px -1px rgba(0, 0, 0, 0.6) !important; }
        html.dark .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.8), 0 4px 6px -2px rgba(0, 0, 0, 0.6) !important; }
        html.dark .shadow-inner { box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.8) !important; }

        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 400ms, transform 400ms; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { createRoot } from 'react-dom/client';
        import React, { useState, useEffect } from 'react';
        import { 
            BookOpen, Users, BrainCircuit, Feather, Camera, 
            Lightbulb, Crosshair, Map, ShieldAlert, Sparkles,
            Quote, Layers, Scale, HeartHandshake, Home, EyeOff, 
            Zap, AlertCircle, Briefcase, Moon, Sun
        } from 'lucide-react';

        // --- UI Components ---

        // UPDATED: Arabic Translation Wrapper Component (Interactive Dropdown)
        const Ar = ({ title, children }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div dir="rtl" className="mt-4 border border-slate-200/80 dark:border-slate-700/80 rounded-xl overflow-hidden text-right transition-all shadow-sm">
                    <button 
                        onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsOpen(!isOpen); }}
                        className="w-full flex items-center justify-between p-3 bg-slate-50/60 dark:bg-slate-800/40 hover:bg-slate-100 dark:hover:bg-slate-700/60 transition-colors"
                    >
                        <div className="flex items-center gap-3">
                            <span className="inline-block bg-slate-200/60 text-slate-600 dark:bg-slate-700/80 dark:text-slate-300 text-[10px] font-bold px-2 py-1 rounded border border-slate-300/50 dark:border-slate-600">شرح مبسط</span>
                            {title && <span className="text-[13px] font-semibold text-slate-700 dark:text-slate-300">{title}</span>}
                        </div>
                        <svg className={`w-4 h-4 text-slate-400 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isOpen ? 'max-h-[2000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        {/* Changed to font-normal, increased line height, softened text color for eye comfort */}
                        <div className="p-4 bg-white/40 dark:bg-slate-900/30 border-t border-slate-100 dark:border-slate-800 text-slate-600 dark:text-slate-400 text-[14.5px] leading-[1.8] font-normal font-sans">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const Section = ({ title, subtitle, icon: Icon, children, color = "emerald" }) => {
            const styles = {
                emerald: { header: "from-emerald-700 to-teal-900", text: "text-emerald-50", icon: "text-emerald-200" },
                slate: { header: "from-slate-700 to-slate-900", text: "text-slate-50", icon: "text-slate-300" },
                rose: { header: "from-rose-700 to-red-900", text: "text-rose-50", icon: "text-rose-200" },
                amber: { header: "from-amber-600 to-orange-800", text: "text-amber-50", icon: "text-amber-200" },
                indigo: { header: "from-indigo-700 to-violet-900", text: "text-indigo-50", icon: "text-indigo-200" }
            };
            const s = styles[color] || styles.emerald;

            return (
                <div className="bg-white rounded-[2rem] shadow-lg shadow-slate-200/50 overflow-visible mb-10 border border-slate-100 relative group">
                    <div className={`p-8 bg-gradient-to-br ${s.header} rounded-t-[2rem] relative overflow-hidden`}>
                        <div className={`absolute -right-10 -top-10 ${s.icon} opacity-10 rotate-12 transition-transform duration-700 group-hover:rotate-6 group-hover:scale-110`}>
                            <Icon size={180} />
                        </div>
                        <div className="relative z-10 flex items-start gap-5">
                            <div className="p-3.5 bg-white/20 backdrop-blur-md rounded-2xl text-white shadow-inner shrink-0">
                                <Icon size={32} />
                            </div>
                            <div>
                                <h2 className="text-3xl font-black tracking-tight text-white mb-1">{title}</h2>
                                {subtitle && <p className={`font-medium ${s.text} opacity-90`}>{subtitle}</p>}
                            </div>
                        </div>
                    </div>
                    <div className="p-6 md:p-8 space-y-6 text-slate-700 leading-relaxed text-lg">
                        {children}
                    </div>
                </div>
            );
        };

        const ComparisonTable = ({ title, leftTitle, rightTitle, rows, color="emerald" }) => (
            <div className="border border-slate-200 rounded-2xl overflow-visible shadow-sm my-8">
                {title && <div className={`bg-slate-100 px-4 py-3 text-xs font-black uppercase text-slate-700 text-center tracking-widest border-b border-slate-200 rounded-t-2xl`}>{title}</div>}
                <div className={`grid grid-cols-2 bg-slate-50 border-b border-slate-200 font-black text-sm text-slate-800 uppercase tracking-wide ${!title ? 'rounded-t-2xl' : ''}`}>
                    <div className="p-4 text-center border-r border-slate-200">{leftTitle}</div>
                    <div className="p-4 text-center">{rightTitle}</div>
                </div>
                {rows.map((row, i) => (
                    <div key={i} className={`grid grid-cols-2 text-sm border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors ${i === rows.length - 1 ? 'rounded-b-2xl' : ''}`}>
                        <div className="p-5 border-r border-slate-100 leading-relaxed">
                            {row.left}
                        </div>
                        <div className="p-5 leading-relaxed">
                            {row.right}
                        </div>
                    </div>
                ))}
            </div>
        );

        const PlotStep = ({ act, title, description, isLast, color = "emerald" }) => {
            const lineColors = {
                emerald: "bg-emerald-100",
                indigo: "bg-indigo-100",
                rose: "bg-rose-100",
                amber: "bg-amber-100",
                slate: "bg-slate-200"
            };
            const numberColors = {
                emerald: "bg-emerald-50 text-emerald-700",
                indigo: "bg-indigo-50 text-indigo-700",
                rose: "bg-rose-50 text-rose-700",
                amber: "bg-amber-50 text-amber-700",
                slate: "bg-slate-100 text-slate-700"
            };

            return (
                <div className="flex gap-4 md:gap-6 relative">
                    {!isLast && <div className={`absolute left-6 top-10 bottom-[-20px] w-0.5 ${lineColors[color] || lineColors.emerald}`}></div>}
                    <div className={`w-12 h-12 rounded-full border-4 border-white shadow-sm flex items-center justify-center font-black shrink-0 relative z-10 ${numberColors[color] || numberColors.emerald}`}>
                        {act}
                    </div>
                    <div className="pb-10 pt-2 w-full">
                        <h4 className="text-xl font-bold text-slate-900 mb-3">{title}</h4>
                        <div className="text-slate-600 leading-relaxed space-y-3 text-base">
                            {description}
                        </div>
                    </div>
                </div>
            );
        };

        const CharacterCard = ({ name, role, details, icon: Icon, color = "emerald" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const borderColors = {
                emerald: isOpen ? 'border-emerald-400 ring-emerald-400' : 'hover:border-emerald-300',
                indigo: isOpen ? 'border-indigo-400 ring-indigo-400' : 'hover:border-indigo-300',
                rose: isOpen ? 'border-rose-400 ring-rose-400' : 'hover:border-rose-300',
                amber: isOpen ? 'border-amber-400 ring-amber-400' : 'hover:border-amber-300',
                slate: isOpen ? 'border-slate-400 ring-slate-400' : 'hover:border-slate-300'
            };
            const iconColors = {
                emerald: isOpen ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500',
                indigo: isOpen ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-500',
                rose: isOpen ? 'bg-rose-100 text-rose-700' : 'bg-slate-100 text-slate-500',
                amber: isOpen ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500',
                slate: isOpen ? 'bg-slate-200 text-slate-800' : 'bg-slate-100 text-slate-500'
            };
            const indicatorColors = {
                emerald: isOpen ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400',
                indigo: isOpen ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-400',
                rose: isOpen ? 'bg-rose-100 text-rose-700' : 'bg-slate-100 text-slate-400',
                amber: isOpen ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-400',
                slate: isOpen ? 'bg-slate-200 text-slate-800' : 'bg-slate-100 text-slate-400'
            };

            return (
                <div className={`bg-white border rounded-2xl transition-all duration-300 ${isOpen ? 'shadow-md ring-1 overflow-visible' : 'shadow-sm overflow-hidden'} ${borderColors[color] || borderColors.emerald}`}>
                    <div 
                        className="p-5 flex items-center justify-between cursor-pointer bg-slate-50/50"
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <div className="flex items-center gap-4">
                            <div className={`p-2 rounded-lg ${iconColors[color] || iconColors.emerald}`}>
                                <Icon size={24} />
                            </div>
                            <div>
                                <h3 className="font-bold text-slate-900 text-lg">{name}</h3>
                                <p className="text-xs font-bold text-slate-500 uppercase tracking-wide">{role}</p>
                            </div>
                        </div>
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors ${isOpen ? 'rotate-180' : ''} ${indicatorColors[color] || indicatorColors.emerald}`}>
                            <svg className="w-5 h-5 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                        </div>
                    </div>
                    {/* Increased max-h to 3000px to ensure the Arabic Dropdown fits when expanded inside the card */}
                    <div className={`transition-all duration-500 ease-in-out ${isOpen ? 'max-h-[3000px] opacity-100 overflow-visible' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                        <div className="p-6 border-t border-slate-100 text-slate-600 text-base leading-relaxed space-y-3 bg-white rounded-b-2xl">
                            {details}
                        </div>
                    </div>
                </div>
            );
        }

        const TermBox = ({ title, content, icon: Icon, color = "emerald" }) => {
            const colors = {
                emerald: "bg-emerald-50 border-emerald-200 text-emerald-900",
                slate: "bg-slate-50 border-slate-300 text-slate-900",
                rose: "bg-rose-50 border-rose-200 text-rose-900",
                amber: "bg-amber-50 border-amber-200 text-amber-900",
                indigo: "bg-indigo-50 border-indigo-200 text-indigo-900"
            };
            return (
                <div className={`p-5 rounded-2xl border ${colors[color] || colors.emerald}`}>
                    <h4 className="font-bold flex items-center gap-2 mb-3 text-lg">
                        {Icon && <Icon size={20} className="opacity-70" />}
                        {title}
                    </h4>
                    <div className="text-sm leading-relaxed opacity-90 space-y-2">
                        {content}
                    </div>
                </div>
            );
        }

        const Vocab = ({ word, simple }) => (
            <span className="group/vocab relative inline-block cursor-help text-emerald-700 font-semibold border-b border-dashed border-emerald-400/60 hover:text-emerald-900 hover:border-emerald-600 transition-all duration-150 pb-0.5">
                {word}
                <span className="pointer-events-none absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-max max-w-[220px] opacity-0 scale-95 origin-bottom group-hover/vocab:opacity-100 group-hover/vocab:scale-100 transition-all duration-200 ease-out bg-slate-900/95 backdrop-blur-sm text-slate-200 text-xs font-medium px-3 py-1.5 rounded-lg shadow-xl border border-slate-800/80 text-center leading-snug z-50">
                    {simple}
                    <span className="absolute top-full left-1/2 -translate-x-1/2 w-2 h-2 bg-slate-900/95 border-r border-b border-slate-800/80 rotate-45 -mt-1"></span>
                </span>
            </span>
        );

        const QuoteCard = ({ dialogue, examParagraphs, borderSide = "border-amber-500", themeColor = "emerald" }) => {
            const headingColors = {
                emerald: "text-emerald-800 border-emerald-100/30",
                indigo: "text-indigo-800 border-indigo-100/30",
                rose: "text-rose-800 border-rose-100/30",
                amber: "text-amber-800 border-amber-100/30",
                slate: "text-slate-800 border-slate-200/50"
            };
            const bgColors = {
                emerald: "bg-emerald-50/25 border-emerald-100/50",
                indigo: "bg-indigo-50/25 border-indigo-100/50",
                rose: "bg-rose-50/25 border-rose-100/50",
                amber: "bg-amber-50/25 border-amber-100/50",
                slate: "bg-slate-50/50 border-slate-200/50"
            };

            return (
                <div className="bg-white rounded-[2rem] border border-slate-200/60 shadow-sm hover:shadow-md transition-all duration-300 overflow-visible p-6 md:p-8 space-y-5">
                    {/* Cozy Dialogue Frame */}
                    <div className={`bg-slate-50/70 rounded-2xl p-5 border-l-4 ${borderSide} relative overflow-visible`}>
                        <div className="absolute right-4 top-2 text-slate-200/50 pointer-events-none select-none font-serif text-4xl">“</div>
                        <div className="relative z-10 space-y-2 font-serif text-slate-700 text-sm md:text-base leading-relaxed">
                            {dialogue}
                        </div>
                    </div>
                    
                    {/* Integrated Exam Answer Block */}
                    <div className={`p-5 rounded-2xl border overflow-visible space-y-3 ${bgColors[themeColor] || bgColors.emerald}`}>
                        <span className={`text-[10px] font-black uppercase tracking-widest flex items-center gap-1 border-b pb-2 ${headingColors[themeColor] || headingColors.emerald}`}>
                            <Feather size={12}/> Exam Answer
                        </span>
                        <div className="text-slate-800 text-sm leading-relaxed font-normal space-y-3">
                            {examParagraphs}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main Application ---

        const App = () => {
            const [activePlay, setActivePlay] = useState('wildDuck');
            const [activeTab, setActiveTab] = useState('foundation');
            const [isAnimating, setIsAnimating] = useState(false);
            const [isPlayDropdownOpen, setIsPlayDropdownOpen] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const handlePlaySwitch = (play) => {
                if(play === activePlay) return;
                setIsAnimating(true);
                setTimeout(() => {
                    setActivePlay(play);
                    setActiveTab('foundation');
                    setIsAnimating(false);
                }, 150);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleTabSwitch = (tab) => {
                if(tab === activeTab) return;
                setIsAnimating(true);
                setTimeout(() => {

                    setIsAnimating(false);
                }, 150);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const tabs = [
                { id: 'foundation', label: 'Overview & Plot', icon: BookOpen },

                { id: 'realism', label: 'Critical Analysis', icon: Scale },

            ];

                wildDuck: {
                    accent: "text-emerald-700",
                    bgAccent: "bg-emerald-800",
                    shadowAccent: "shadow-emerald-900/30",
                    navActive: "text-emerald-700",
                    tabSelection: "emerald"
                },
                othello: {
                    accent: "text-indigo-700",
                    bgAccent: "bg-indigo-800",
                    shadowAccent: "shadow-indigo-900/30",

                    tabSelection: "indigo"
                },
                missJulie: {
                    accent: "text-rose-700",
                    bgAccent: "bg-rose-800",
                    shadowAccent: "shadow-rose-900/30",
                    navActive: "text-rose-700",
                    tabSelection: "rose"
                },
                tamingOfTheShrew: {
                    accent: "text-amber-700",

                },
                theFather: {

                    shadowAccent: "shadow-slate-900/30",
                    navActive: "text-slate-700",

            const activeColors = themeColors[activePlay] || themeColors.wildDuck;

            return (
                <div className="min-h-screen hero-pattern font-sans selection:bg-slate-200 selection:text-slate-900 dark:selection:bg-slate-700 dark:selection:text-slate-100 pb-24 transition-colors duration-300">
                    
                    {/* Header & Play Selector / Nav */}

                                                    >
                                                        The Wild Duck

                                                    >
                                                        Othello
                                                    </button>

                                                    >

                                                    <button

                                                        className={`w-full text-left px-3 py-2 rounded-xl text-xs font-bold uppercase tracking-wide transition-colors ${activePlay === 'theFather' ? 'bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-white font-extrabold' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700'}`}
                                                    >
                                                        The Father

                                                    <button 
                                                        onClick={() => { handlePlaySwitch('theory'); setIsPlayDropdownOpen(false); }}
                                                        className={`w-full text-left px-3 py-2 rounded-xl text-xs font-bold uppercase tracking-wide transition-colors ${activePlay === 'theory' ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-300 font-extrabold' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700'}`}

                                <div className="flex items-center gap-2 lg:gap-4 overflow-visible shrink-0">
                                    {/* Desktop Navigation Tabs (>= 1024px) */}
                                    {activePlay !== 'theory' && (
                                        <nav className="hidden lg:flex p-1 bg-slate-200/50 dark:bg-slate-800 rounded-2xl gap-1">
                                            {tabs.map((tab) => {
                                                const TabIcon = tab.icon;
                                                return (
                                                    <button
                                                        key={tab.id}
                                                        onClick={() => handleTabSwitch(tab.id)}
                                                        className={`px-3.5 py-1.5 rounded-xl text-xs font-black uppercase tracking-wide transition-all duration-200 whitespace-nowrap flex items-center gap-2 ${
                                                            activeTab === tab.id 
                                                            ? `bg-white dark:bg-slate-700 ${activeColors.navActive} dark:text-white shadow-sm ring-1 ring-black/5` 
                                                            : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-700/50'

                                    {/* Dark Mode Toggle */}
                                    <button
                                        onClick={() => setIsDarkMode(!isDarkMode)}
                                        className="p-2 rounded-xl text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-800 transition-colors flex items-center justify-center shrink-0"

                            {activePlay !== 'theory' && (
                                <div className="relative mt-3 lg:hidden">

                                    <div className="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-white dark:from-slate-900 to-transparent pointer-events-none z-10"></div>

                                    <div className="flex flex-nowrap p-1 bg-slate-100 dark:bg-slate-800 rounded-2xl overflow-x-auto no-scrollbar gap-1 relative z-0">
                                        {tabs.map((tab) => {
                                            const TabIcon = tab.icon;
                                            return (
                                                <button
                                                    key={tab.id}
                                                    onClick={() => handleTabSwitch(tab.id)}

                                                        activeTab === tab.id 
                                                        ? `bg-white dark:bg-slate-700 ${activeColors.navActive} dark:text-white shadow-sm ring-1 ring-black/5` 
                                                        : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'

                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className={`max-w-5xl mx-auto px-4 md:px-6 py-10 transition-opacity duration-150 ${isAnimating ? 'opacity-0' : 'opacity-100'}`}>

                        {/* =========================================
                            PLAY VIEW 1: THE WILD DUCK (EXACT NOTES)
                            ========================================= */}
                        {activePlay === 'wildDuck' && (
                            <div className="space-y-10">
                                
                                {/* TAB 1: FOUNDATION & PLOT */}
                                {activeTab === 'foundation' && (
                                    <div className="space-y-10 animate-in fade-in duration-300">
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row gap-6 items-center hover:border-emerald-200 transition-colors">
                                            <div className="md:w-1/4 flex justify-center">
                                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center border-4 border-white shadow-md text-slate-400">
                                                    <BookOpen size={40} />
                                                </div>
                                            </div>
                                            <div className="md:w-3/4 text-center md:text-left space-y-2">
                                                <h2 className="text-2xl font-black text-slate-800">Henrik Ibsen</h2>
                                                <p className="text-slate-600 text-sm leading-relaxed">
                                                    Norwegian playwright known as the <strong>"father of realism"</strong> and a founder of modernism. His works, including <em>A Doll's House</em> and <em>The Wild Duck</em>, are among the most frequently performed in the world.
                                                </p>
                                                <Ar>هنريك إبسن: كاتب مسرحي نرويجي يُلقب بـ "أبو الواقعية" وأحد مؤسسي الحداثة في الأدب. تعد أعماله مثل "بيت الدمية" و "البطة البرية" من أكثر المسرحيات عرضاً في العالم، حيث تسلط الضوء على تناقضات المجتمع والأمراض النفسية المختبئة خلف المظاهر.</Ar>
                                            </div>
                                        </div>

                                        <Section title="Plot Summary" subtitle="Act by Act Breakdown" icon={Map} color="emerald">
                                            <div className="bg-white rounded-2xl border border-slate-100 p-6 md:p-10 shadow-sm">
                                                <PlotStep act="I" title="The Dinner Party & The Return" color="emerald" description={
                                                    <>
                                                        <p>The play opens in the study at Hakon Werle's house during a dinner party celebrating the return of his son, <strong>Gregers</strong>, from the Hoidal mines (away for 15 years).</p>
                                                        <p><strong>Old Ekdal</strong> (an army officer, former partner to Werle until a forestry scandal sent him to prison) begs servants to be let into the office. He now works as Werle's copyist.</p>
                                                        <p>During dinner, Hialmar Ekdal (who overheard father/son talking) notes Gregers shouldn't have invited him. Hialmar tells of his life after his father's disgrace. Surprisingly, Werle helped Hialmar start a photography studio and marry Gina (who coincidentally worked in Werle's house during Mrs. Werle's illness).</p>
                                                        <p>When Old Ekdal crosses the threshold, Werle gasps in disgust; Hialmar pretends to ignore his own father. A dejected Hialmar leaves.</p>
                                                        <p>Gregers accuses his father of passing the forestry scandal onto Old Ekdal and of an inappropriate past interest in Gina (revealed by Gregers' mother on her deathbed). Werle rebukes him and announces plans to marry Mrs. Sorby. Gregers leaves, announcing <Vocab word="enigmatically" simple="mysteriously" /> he finally sees his "mission in life."</p>
                                                        <Ar>تبدأ المسرحية بحفل عشاء يقيمه رجل الأعمال الثري "هوكُن ويرلي" احتفالاً بعودة ابنه "جريجرز" بعد 15 عاماً من الغياب. خلال الحفل، يكتشف جريجرز أسراراً صادمة: والده هو السبب الخفي وراء سجن ودمار شريكه السابق "إكدال العجوز"، والأسوأ أنه زوّج خادمته السابقة "جينا" (بعد أن أقام معها علاقة) لصديق جريجرز القديم "هيلمار إكدال" للتغطية على فضيحته. يقرر جريجرز الغاضب ترك منزل أبيه ليكشف هذه الأكاذيب لصديقه، معتبراً أن إظهار الحقيقة هي "مهمته الكبرى في الحياة".</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="II" title="The Studio & The Garret" color="emerald" description={
                                                    <>
                                                        <p>In Hialmar's studio, Hialmar declares his love for his family. Gregers arrives and chats with them. Hialmar reveals his daughter <strong>Hedvig</strong> is going blind.</p>
                                                        <p>Ekdal shows Gregers a deep garret in the back of the room filled with nooks, crannies, and a fowl in a basket—<strong>a wild duck</strong> belonging to Hedvig. Werle had wounded it on a hunting expedition, and the family won it.</p>
                                                        <p>Gregers insists on renting the Ekdals' spare room, stating he will be "like the wild duck himself."</p>
                                                        <Ar>ننتقل إلى منزل "هيلمار" حيث يعيش حياة بسيطة ومستقرة ظاهرياً مع زوجته جينا وابنته "هيدفيج" المهددة بالعمى. يُطلعون جريجرز على مكان غريب في آخر المنزل "العلية"، حيث يحتفظون بـ "بطة برية" كان والد جريجرز قد أصابها برصاصة أثناء الصيد، لكنها نجت واحتفظت بها العائلة. البطة هنا ترمز للعائلة نفسها التي تعيش معزولة وفي ظروف غير طبيعية. يقرر جريجرز استئجار غرفة في هذا المنزل ليكون قريباً منهم ويبدأ خطته في كشف الحقائق المخفية.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="III" title="Morning & The Invention" color="emerald" description={
                                                    <>
                                                        <p>Morning in the studio. Hialmar retouches a photograph but yearns to join his father in the garret. Hedvig (who left school to protect her eyes and spends her time in the garret with the duck and old sea captain treasures) offers to do his work.</p>
                                                        <p>A shot rings out from the garret; Hedvig says the men are "out shooting."</p>
                                                        <p>Gregers asks if Hialmar leaves the studio work to his wife. Hialmar claims he is dedicated to a <strong>great invention</strong> (which takes time) to <Vocab word="redeem" simple="save/restore" /> the family's name. Gregers wonders if the garret distracts him, noting Hialmar has dived into a "poisonous marsh."</p>
                                                        <p>Dr. Relling and Molvik appear. Relling knows Gregers from the Hoidal works (they had skirmishes). As they toast Hedvig's upcoming birthday, Relling wonders if Gregers brought the <Vocab word="taint" simple="corruption/pollution" /> into the house with his <strong>"claim of the ideal."</strong></p>
                                                        <Ar>في هذا الفصل تتضح طبيعة "هيلمار" الحقيقية؛ فهو رجل كسول، يترك كل أعباء العمل في الأستوديو لزوجته وابنته، بينما يقضي وقته في العلية متوهماً أنه يعمل على "اختراع عظيم" لإنقاذ سمعة عائلته، وهو في الواقع لا يفعل شيئاً. في هذه الأثناء، يلاحظ جارهم الدكتور "ريلينج" – وهو شخصية ساخرة وواقعية – محاولات جريجرز المستمرة لفرض "المثالية المطلقة" على العائلة، ويحذر من أن هذه المثالية المزعجة ستجلب الخراب والدمار لهذا المنزل الهادئ.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="IV" title="The Revelation & The Letter" color="emerald" description={
                                                    <>
                                                        <p>At dusk, after a walk with Gregers, a grim Hialmar returns. He pledges to take up studio work himself, never set foot in the garret again, and wants to wring the wild duck's neck.</p>
                                                        <p>Hialmar confronts Gina: she was Werle's <Vocab word="concubine" simple="mistress" />. Hedvig appears breathlessly with a birthday letter from Werle promising a monthly income to Ekdal that passes to Hedvig upon his death.</p>
                                                        <p>Gregers warns Werle is trying to buy him off. Hialmar tears the letter, confronts Gina asking if Hedvig is actually his child (she replies she cannot know), and flees.</p>
                                                        <p>Hedvig thinks her father no longer wants her because she isn't his. Gregers suggests she <strong>sacrifice the precious wild duck</strong> to prove her love for her father.</p>
                                                        <Ar>تقع الصدمة الكبرى عندما يواجه جريجرز صديقه هيلمار بالحقيقة القاسية: زوجته جينا كانت عشيقة لوالده، وهناك احتمال كبير ألا تكون "هيدفيج" ابنته الحقيقية بسبب العمى الوراثي الذي يربطها بالجد ويرلي. ينهار هيلمار نفسياً ويبدأ في التصرف بدرامية، متبرئاً من ابنته التي تعشقه. الطفلة تنهار حزناً، وهنا يتدخل جريجرز بنصيحة مريضة ومميتة: يقنع هيدفيج بأن تقتل "البطة البرية" التي تحبها بشدة لتثبت لوالدها حجم تضحيتها وحبها له عساه يسامحها.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="V" title="Tragedy & The Aftermath" color="emerald" isLast={true} description={
                                                    <>
                                                        <p>Cold morning; a snowstorm roars. Relling reports Hialmar is snoring on his sofa. Relling diagnoses Gregers with "integrity fever" and a "delirium of hero-worship," stating Hialmar's usual cure is the <strong>"life-illusion" (Livslognen)</strong>.</p>
                                                        <p>An unkempt Hialmar enters, planning to leave and take Ekdal with him. He <Vocab word="repudiates" simple="rejects" /> Hedvig anew. Terrified, Hedvig takes a pistol and creeps into the garret.</p>
                                                        <p>Hialmar, exhausted, eats breakfast, agrees to stay a few days, and glues Werle's letter back together (rationalizing it is for his father to decline).</p>
                                                        <p>A shot rings out. Gregers triumphantly announces Hedvig has sacrificed the duck. Hialmar opens the door to discover Hedvig <Vocab word="prostrate" simple="lying flat" />—the bullet pierced her chest. Relling declares her dead and informs Gregers she certainly killed herself.</p>
                                                        <Ar>يعود هيلمار بعد ليلة من التخبط، ورغم تظاهره بالغضب المستمر، يبدأ في اختلاق المبررات للعودة لحياته المريحة مع زوجته، مما يثبت أنه يحب العيش في الأوهام. فجأة، يُسمع دوي رصاصة من العلية؛ يبتسم جريجرز ظناً منه أن الطفلة نفذت نصيحته وقتلت البطة، لكن الكارثة تحل حين يكتشفون أن هيدفيج أطلقت النار على نفسها وماتت لتُرضي والدها. ينتهي المشهد بالدكتور ريلينج وهو يهاجم جريجرز ومثالياته بشدة، مؤكداً أن سلب الناس أوهامهم التي تبقيهم على قيد الحياة لا يؤدي إلا إلى الموت والخراب.</Ar>
                                                    </>
                                                } />
                                            </div>
                                        </Section>
                                    </div>
                                )}

                                {/* TAB 2: CHARACTERS */}
                                {activeTab === 'characters' && (
                                    <div className="space-y-6 animate-in fade-in duration-300 overflow-visible">
                                        <div className="bg-slate-800 text-white p-8 rounded-3xl mb-8 shadow-lg">
                                            <h2 className="text-3xl font-black mb-4 flex items-center gap-3">
                                                <Users className="text-emerald-400"/> Dramatis Personae
                                            </h2>
                                            <p className="text-slate-300 text-lg leading-relaxed mb-6">
                                                Ibsen's characters are complex psychological studies. No character is entirely right or wrong, reflecting the moral ambiguity of real life.
                                            </p>
                                            <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                                <h4 className="font-bold text-emerald-300 mb-2 uppercase tracking-widest text-xs">Minor Characters Checklist</h4>
                                                <p className="text-sm text-slate-300">
                                                    <strong className="text-white">Bertha Sorby:</strong> (Werle's fiancée) • <strong className="text-white">Molvik:</strong> (Drunken tutor) • <strong className="text-white">Graberg:</strong> (Bookkeeper) • <strong className="text-white">Pettersen:</strong> (Servant) • <strong className="text-white">Jensen:</strong> (Waiter)
                                                </p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-6 overflow-visible">
                                            <CharacterCard name="Hialmar Ekdal" role="The Deluded 'Romantic Hero'" icon={Camera} color="emerald" details={
                                                <>
                                                    <p><strong>Background:</strong> Son of Old Ekdal. Left university after his father's ruin, became a photographer, married Gina Hansen.</p>
                                                    <p><strong>The Illusion:</strong> Seen by Gregers as an upstanding everyman, but presented critically by Ibsen. He lets his wife and daughter do the actual work while he daydreams in the garret about a "great invention" that never progresses. This parodies the romantic notion that creativity is driven solely by spontaneous inspiration.</p>
                                                    <p><strong>Integrity:</strong> Lacks true personal integrity. He lives in comforting illusions, seeing himself as a moral figure while avoiding responsibility. His integrity is superficial—he prefers false dignity over painful truths.</p>
                                                    <p><strong>Development:</strong> He loves Hedvig and worries about the future, but Gregers' revelation uproots him. He plans to move out, but Hedvig's death ultimately reconciles him to Gina.</p>
                                                    <Ar>هيلمار إكدال: البطل الرومانسي الواهم. يعيش في دور الضحية النبيلة ويعتقد أنه يعمل على "اختراع عظيم"، بينما في الحقيقة هو رجل كسول ومهزوز يترك مسؤولية العمل بالكامل لزوجته وابنته. يفتقر إلى النزاهة الشخصية ويفضل العيش في الأكاذيب المريحة بدلاً من مواجهة واقع الحياة القاسي.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Gregers Werle" role="The Destructive Idealist" icon={Lightbulb} color="emerald" details={
                                                <>
                                                    <p><strong>Background:</strong> Son of Håkon Werle, away at the Höidal works for 15 years. Resents his father for shady business and betraying his mother.</p>
                                                    <p><strong>The Ideal:</strong> Represents uncompromising personal integrity. He feels obligated to pursue truth and clarity at all costs ("claim of the ideal"). He <Vocab word="insinuates" simple="sneaks/inserts" /> himself into the Ekdals' lives, believing that revealing the truth will save them (like a dog rescuing the wild duck).</p>
                                                    <p><strong>The Flaw:</strong> He does not realize the Ekdals are happy living a lie. His rigid commitment to truth destroys their fragile emotional balance. Ibsen uses him to show that integrity taken to extremes, without empathy, is destructive.</p>
                                                    <p><strong>Symbolism:</strong> Referred to as "ugly" throughout the play, presaging his ultimate destructive effect. His ideals brainwash Hedvig, leading to her death.</p>
                                                    <Ar>جريجرز ويرلي: المثالي المدمّر. يمثل السعي الأعمى وراء الحقيقة المطلقة مهما كان الثمن. يعتقد أن كشف أكاذيب الماضي سيطهّر عائلة صديقه ويوصلهم للسعادة، لكنه يتجاهل حقيقة أن بعض الناس يحتاجون لهذه الأوهام للبقاء على قيد الحياة. تؤدي تدخلاته غير المحسوبة إلى كارثة موت الطفلة، ليثبت إبسن أن المثالية بدون تعاطف هي مرض مدمر.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Hedvig Ekdal" role="The Tragic Victim" icon={HeartHandshake} color="emerald" details={
                                                <>
                                                    <p><strong>Background:</strong> Gina's 14-year-old daughter (paternity open: Hialmar or Håkon). Forced to abandon schooling due to encroaching blindness (heredity from Håkon).</p>
                                                    <p><strong>Personality:</strong> Bright, <Vocab word="precocious" simple="smart for her age" />, emotionally intelligent, and possesses innocent/pure integrity. She is sincere and incapable of deception. Takes things literally.</p>
                                                    <p><strong>Connection to the Duck:</strong> Highly attached to the wild duck. Like Old Ekdal, she is wounded and a prisoner in her home. When manipulated by Gregers to sacrifice the duck to prove her love for Hialmar, she takes matters into her own hands and kills herself.</p>
                                                    <p><strong>Irony:</strong> The only way she can truly be free is through death, sinking to the "depths of the sea" she imagines in the garret.</p>
                                                    <Ar>هيدفيج: الضحية البريئة (14 عاماً). طفلة حساسة ومخلصة، مهددة بالعمى الوراثي. ترتبط عاطفياً بالبطة البرية لأنها تشعر بالعزلة مثلها. عندما يتنكر لها والدها بسبب شكوكه في نسبها، تستمع لنصيحة جريجرز المريضة وتقرر التضحية بأغلى ما تملك (حياتها) لتثبت لوالدها مدى حبها له.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Old Ekdal" role="The Broken Patriarch" icon={ShieldAlert} color="emerald" details={
                                                <>
                                                    <p><strong>Background:</strong> Hialmar's father, former military officer and business partner of Werle. Framed by Werle for illegal timber felling, lost everything, and went to prison. Now does clerical work for Werle.</p>
                                                    <p><strong>The Illusion:</strong> A shameful man plagued with regret, yet deeply sympathetic. He protests his loss of honor by quietly wearing his old military uniform at home. He invents an imaginary forest in the garret, pretending rabbits are bears, to simulate his past hunting days.</p>
                                                    <p><strong>Metaphorical Parallel:</strong> He IS the wild duck. Wounded by Werle, instead of killing himself, he lives in financial captivity, constantly regretting the past, reclaiming shattered fragments in the garret.</p>
                                                    <Ar>الجد إكدال العجوز: ضابط سابق تم تشويه سمعته وسجنه بسبب خدعة من شريكه الثري. بعد خروجه من السجن، أصبح رجلاً محطماً. للهروب من هذا العار، يختبئ في علية المنزل، ويصنع غابة وهمية يمارس فيها "الصيد" ليتخيل أنه لا يزال القائد العسكري القوي. يمثل هو شخصياً "البطة البرية" التي أُصيبت واختبأت في القاع المظلم.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Håkon Werle" role="The Wealthy Industrialist" icon={Briefcase} color="emerald" details={
                                                <>
                                                    <p><strong>Background:</strong> Gregers' father. A ruthless, cold businessman who framed Old Ekdal. Over time, became <Vocab word="penitent" simple="sorry/repentant" /> and secretly helped the Ekdals recover.</p>
                                                    <p><strong>Actions:</strong> Had a scandalous relationship with Gina, then married her off to Hialmar to tie up loose ends. Estranged from Gregers.</p>
                                                    <p><strong>Current State:</strong> Losing his eyesight in old age (linking him biologically to Hedvig). Reconsiders his life, plans to marry his housekeeper Mrs. Sorby, and invites Gregers back.</p>
                                                    <p><strong>The Catalyst:</strong> His ultimate gift (the deed providing income) triggers Hialmar's tirade, leading to the tragic climax.</p>
                                                    <Ar>هوكُن ويرلي: رجل الأعمال الثري ووالد جريجرز. شخصية ماكرة وراء دمار عائلة إكدال. مع تقدمه في العمر وبدء فقدانه لبصره، يحاول التكفير عن أخطائه سراً بدعم عائلة هيلمار مادياً. تصرفاته المعقدة تضع المتلقي أمام حيرة: هل هو حقاً شرير أم رجل يحاول إصلاح أخطاء الماضي بطريقته؟</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Gina Ekdal" role="The Practical Anchor" icon={Home} color="emerald" details={
                                                <>
                                                    <p><strong>Background:</strong> Hialmar's wife, former servant/concubine to Werle. Handles the family's actual work (taking pictures, accounting).</p>
                                                    <p><strong>Integrity:</strong> Represents practical integrity. She knows the truth about her past but chooses stability over confrontation. Her honesty is selective, aimed at protecting the household.</p>
                                                    <p><strong>Contrast:</strong> Presented as crude/uncultured, using <Vocab word="malapropisms" simple="wrong words used comically" /> and plain language (unlike Hialmar or Gregers). She accepts and overlooks the family's deceptions (willing naivety). She represents the harsh truths of the world that people try to cover up.</p>
                                                    <p><strong>Role:</strong> Associated with the idea of altering reality to hide the truth (via her photography work).</p>
                                                    <Ar>جينا إكدال: الزوجة العملية والعمود الفقري للمنزل. على عكس البقية الذين يتحدثون في المثاليات، تهتم جينا بالأمور الملموسة كتحصيل المال وتدبير الطعام والتصوير. تدرك تماماً ماضيها المظلم لكنها تختار الصمت لحماية أسرتها، مفضلةً الاستقرار الواقعي على المواجهات المدمرة.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Dr. Relling" role="The Pragmatic Cynic" icon={Crosshair} color="emerald" details={
                                                <>
                                                    <p><strong>Background:</strong> Lives downstairs with the drunken tutor Molvik. Himself a degenerate drunk, yet highly intelligent and philosophical.</p>
                                                    <p><strong>Philosophy:</strong> Invents and supplies "life-illusions" (Livslognen) for those around him. He argues these illusions prevent people from falling into existential despair.</p>
                                                    <p><strong>Conflict:</strong> Holds Gregers' idealism in utter contempt. Advocates for a realistic (even if deceitful) approach to life. He values psychological survival over moral idealism.</p>
                                                    <p><strong>Significance:</strong> Acts as a stand-in for Ibsen's viewpoint, making it especially interesting that Ibsen chose an insignificant, <Vocab word="disreputable" simple="unrespected" /> character to deliver the play's core psychological truths.</p>
                                                    <Ar>الدكتور ريلينج: جار العائلة الطبيب الساخر (ومدمن الخمر أحياناً). يمثل صوت الحكمة الواقعية في المسرحية، وصوت الكاتب نفسه. يرى ريلينج أن البشر ضعفاء وأنهم بحاجة إلى "أكاذيب" وأوهام بسيطة (يُسميها "وهم الحياة") لكي يتحملوا قسوة الواقع. يحتقر جريجرز بشدة ويعتبره مصاباً بـ "حمى النزاهة" التي تدمر من حوله.</Ar>
                                                </>
                                            } />
                                        </div>
                                    </div>
                                )}

                                {/* TAB 3: THEMES */}
                                {activeTab === 'themes' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <Section title="Illusion vs. Reality" subtitle="The Architecture of Deceit" icon={EyeOff} color="amber">
                                            <div className="mb-4">
                                                The characters, particularly the Ekdals, create illusions to cope with failures. Hialmar deludes himself with dreams of invention; Ekdal retreats to attic-hunts. Gregers disrupts this fragile, deceit-built happiness with the "claim of the ideal."
                                                <br/><br/><strong>Theme takeaway:</strong> Truth is not always liberating. Rigid ideals rarely fit emotional needs, and human happiness often depends on fragile illusions. No character is entirely right or wrong.
                                            </div>
                                            <Ar title="الوهم مقابل الحقيقة">
                                                يبني أفراد عائلة إكدال لأنفسهم أوهاماً للتعايش مع فشلهم (مثل اختراع هيلمار المزعوم وصيد الجد في العلية). يتدخل جريجرز محاولاً هدم هذه الأكاذيب ونشر "المثالية والحقيقة"، لكن النتيجة تكون دمار العائلة. **الدرس المستفاد:** الحقيقة المطلقة ليست دائماً مُحررة؛ أحياناً يحتاج الإنسان إلى "أكاذيب بريئة" ليتمكن من تحمل قسوة حياته.
                                            </Ar>

                                            <ComparisonTable title="The Two Types of Illusion" leftTitle="Traditional Illusions" rightTitle="Transcendental (Idealistic) Illusions" color="amber" rows={[
                                                {
                                                    left: <div className="space-y-2">
                                                        <strong className="text-amber-700 block">The Coping Mechanism</strong>
                                                        <p>Depicted through the Ekdals' daily lives. They rely on <Vocab word="fabricated" simple="fake/made-up" /> reality to cope with downfalls.</p>
                                                        <ul className="list-disc pl-4 space-y-1 mt-2 text-slate-600">
                                                            <li><strong>Hialmar:</strong> Cherishes the illusion of completing an invention to sustain self-esteem.</li>
                                                            <li><strong>Old Ekdal:</strong> Simulates hunting in the attic to reconnect with his respected military past.</li>
                                                        </ul>
                                                    </div>,
                                                    right: <div className="space-y-2">
                                                        <strong className="text-red-700 block">The Destructive Truth</strong>
                                                        <p>Embodied by Gregers Werle's naive philosophy of the "claim of the ideal."</p>
                                                        <ul className="list-disc pl-4 space-y-1 mt-2 text-slate-600">
                                                            <li>Gregers believes revealing truth will <Vocab word="liberate" simple="free" /> the Ekdals to a higher moral plane.</li>
                                                            <li>Instead, it leads to emotional devastation and Hedvig's death. It strips away protective layers revealing truths the characters cannot handle.</li>
                                                        </ul>
                                                    </div>
                                                },
                                                {
                                                    left: <div className="text-center font-black text-amber-600 text-lg">"Traditional illusion allows people to live."</div>,
                                                    right: <div className="text-center font-black text-red-600 text-lg">"Transcendental illusion kills."</div>
                                                }
                                            ]} />
                                            <Ar>الجدول السابق يقارن بين نوعين من الوهم: "الوهم التقليدي" الذي تمارسه عائلة إكدال كوسيلة للتأقلم والبقاء على قيد الحياة، وبين "الوهم المثالي المتعالي" الذي يعتنقه جريجرز بفرض الحقيقة بالقوة المطلقة، وهو الذي يؤدي في النهاية للقتل والدمار.</Ar>
                                        </Section>

                                        <div className="grid md:grid-cols-1 gap-6 overflow-visible">
                                            <TermBox title="Self-Deception" icon={BrainCircuit} color="slate" content={
                                                <ul className="space-y-3">
                                                    <li><strong>Old Ekdal:</strong> Pretends rabbits are bears; wears his old uniform and wig to ignore his age and lost rank.</li>
                                                    <li><strong>Hialmar:</strong> Ignores his father's toupee (calls him "white-haired"). Uses his "invention" as an excuse to let Gina do all the work.</li>
                                                    <li><strong>The Women:</strong> Hedvig takes things literally. Gina willfully ignores deceptions to preserve family stability.</li>
                                                    <li><strong>Relling:</strong> Understands self-deception's psychological purpose; controls which truths to acknowledge.</li>
                                                </ul>
                                            } />
                                            <Ar>يظهر خداع النفس في المسرحية كآلية دفاعية عند كل الشخصيات تقريباً: الجد يخادع نفسه بتخيل العلية كغابة للصيد لتناسي إهانته، وهيلمار يدّعي أنه يعمل على اختراع عظيم ليتهرب من كونه أباً وزوجاً فاشلاً، وجينا تتغافل عن الحقائق فقط لتستمر الأسرة في أمان.</Ar>
                                        </div>

                                        <Section title="Competing Doctrines" subtitle="The Spiritual Doctors: Gregers vs. Relling" icon={Zap} color="rose">
                                            <div className="grid md:grid-cols-2 gap-8 overflow-visible">
                                                <div className="bg-rose-50/50 p-5 rounded-2xl border border-rose-100 overflow-visible">
                                                    <h4 className="font-bold text-rose-800 text-xl mb-3 flex items-center gap-2">The "Claim of the Ideal"</h4>
                                                    <ul className="space-y-2 text-sm text-slate-700">
                                                        <li><strong>Goal:</strong> The soul must attain truth at all costs.</li>
                                                        <li><strong>Method:</strong> Preaches forgiveness, <Vocab word="exaltation" simple="extreme glory" />, and <Vocab word="martyrdom" simple="suffering for a cause" />.</li>
                                                        <li><strong>Reality:</strong> It brings ruin. Relling diagnoses it as a <Vocab word="pathology" simple="disease" />: an <strong>"integrity-fever"</strong> and <strong>"delirium of hero-worship."</strong></li>
                                                    </ul>
                                                </div>
                                                <div className="bg-emerald-50/50 p-5 rounded-2xl border border-emerald-100 overflow-visible">
                                                    <h4 className="font-bold text-emerald-800 text-xl mb-3 flex items-center gap-2">The "Life-Illusion"</h4>
                                                    <ul className="space-y-2 text-sm text-slate-700">
                                                        <li><strong>Goal:</strong> Psychological survival over spiritual truth.</li>
                                                        <li><strong>Method:</strong> Replaces spiritual diagnoses with medical ones. Hialmar is not in spiritual tumult; he is <em>ill</em>.</li>
                                                        <li><strong>Reality:</strong> Requires the <strong>"stimulating principle"</strong> of illusion (e.g., Hialmar's invention) to cure the mental disorder.</li>
                                                    </ul>
                                                </div>
                                            </div>
                                            <Ar>تمثل المسرحية صراعاً بين عقيدتين: عقيدة "المطالبة بالمثالية والحق المطلق" التي يمثلها جريجرز وتؤدي للدمار والموت لأن البشر لا يستطيعون تحمل الحقيقة الكاملة، وعقيدة "وهم الحياة" التي يطرحها الدكتور ريلينج، وتتلخص في إعطاء المرضى النفسيين جرعة من الآمال الكاذبة والأوهام الصغيرة لتبقيهم قادرين على العيش وتجنب الانهيار النفسي.</Ar>
                                        </Section>

                                        <div className="bg-slate-100 p-8 rounded-2xl border border-slate-200 overflow-visible">
                                            <h3 className="text-2xl font-black text-slate-800 mb-4">The Myth of the Fathers</h3>
                                            <p className="text-slate-700 mb-4">
                                                The play is driven by a mysterious crime committed by the patriarchs Werle and Ekdal. This unspoken crime is the "original sin" causing the tragedy (metaphorically described by Ekdal as <strong>"the woods' revenge"</strong>).
                                            </p>
                                            <div className="flex flex-col md:flex-row gap-6 overflow-visible">
                                                <div className="flex-1 bg-white p-5 rounded-xl border-l-4 border-slate-400 shadow-sm overflow-visible">
                                                    <strong className="block text-slate-800 mb-1">Werle: The "Bad Daddy"</strong>
                                                    <p className="text-sm text-slate-600">Perverse and <Vocab word="tyrannical" simple="cruel and controlling" />. In Gregers' view, he acts like a primal father, overshadowing Hialmar in his own home and acting as provider through manipulation.</p>
                                                </div>
                                                <div className="flex-1 bg-white p-5 rounded-xl border-l-4 border-slate-400 shadow-sm overflow-visible">
                                                    <strong className="block text-slate-800 mb-1">Ekdal: The "Good Daddy"</strong>
                                                    <p className="text-sm text-slate-600">Despite his downfall, he is retrospectively idealized as a brave lieutenant and robust hunter. His ruin actually amplifies this idealized image in the minds of the sons.</p>
                                                </div>
                                            </div>
                                            <Ar>أقدار الشخصيات محكومة بخطايا ارتكبها الآباء في الماضي. يُصوّر ويرلي كـ "الأب الفاسد" الذي يتحكم في حياة الجميع بأمواله ومكائده، بينما يظهر الجد إكدال كـ "الأب الضحية" الذي يمجده ابنه رغم فشله وانهياره. الخطايا القديمة تطاردهم وتؤدي في النهاية لعقاب قاسي (موت هيدفيج) وكأنها لعنة القدر.</Ar>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 4: MOTIFS & SYMBOLS */}
                                {activeTab === 'symbols' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <Section title="The Wild Duck" subtitle="The Central Metaphor & Quilting Point" icon={Feather} color="emerald">
                                            <div className="text-lg mb-6">
                                                The duck serves as a <strong>"<Vocab word="quilting point" simple="central connecting idea" />"</strong> for the characters' fantasies. It initially symbolizes freedom and purity, but becomes a metaphor for the destructive consequences of clinging to illusions and avoiding harsh realities.
                                            </div>
                                            
                                            <div className="grid md:grid-cols-2 gap-4 overflow-visible">
                                                <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-100 overflow-visible">
                                                    <strong className="text-emerald-900 block mb-2">Old Ekdal</strong>
                                                    <p className="text-sm text-emerald-800">He figures as the wild duck in having been betrayed and shot down by Werle. He has sunk into <Vocab word="reveries" simple="daydreams" /> never to return.</p>
                                                </div>
                                                <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-100 overflow-visible">
                                                    <strong className="text-emerald-950 block mb-2">Hialmar & Gregers</strong>
                                                    <p className="text-sm text-emerald-800">Gregers sees Hialmar entrapped in the "poisonous marshes" of his household deceit. Gregers sees himself as the clever hunting dog rescuing the bird, or as the duck itself by becoming a tenant.</p>
                                                </div>
                                                <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-100 md:col-span-2 overflow-visible">
                                                    <strong className="text-emerald-900 block mb-2">Hedvig (The Lethal Conclusion)</strong>
                                                    <p className="text-sm text-emerald-800">She loses her origin (she is an adopted child of sorts). Her connection to the duck goes beyond metaphor to a lethal conclusion. Both become the object of sacrifice. When Hialmar abandons her, she is told to kill the duck, but kills herself instead. Like the duck, she doesn't belong in the house, but with her real father, Old Werle.</p>
                                                </div>
                                            </div>
                                            <Ar>الرمز المركزي للمسرحية "البطة البرية". تُسقط كل شخصية واقعها على هذه البطة:
- الجد إكدال يرى فيها نفسه، الطائر الجريح الذي سقط في القاع ولم يستطع التحليق مجدداً بعد خيانة شريكه.
- جريجرز يرى عائلة صديقه كطائر غارق في مستنقع الأكاذيب، ويرى نفسه كلب صيد منقذ.
- هيدفيج الطفلة تتماهى مع البطة لأنها تشعر بالعزلة وأنها مسجونة داخل المنزل (بسبب العمى الوراثي ولأنها طفلة غير شرعية لويرلي). طلب التضحية بالبطة أدى لانتحار الطفلة نفسها.</Ar>
                                        </Section>

                                        <div className="grid md:grid-cols-2 gap-6 overflow-visible">
                                            <TermBox title="Light & Dark" icon={Lightbulb} color="amber" content={
                                                <ul className="space-y-2">
                                                    <li>Light represents truth/enlightenment (associated with Gregers). Darkness represents ignorance/hidden aspects.</li>
                                                    <li>Ibsen complicates this: Gregers brings "light," but it destroys happiness, leading to oppression and gloom.</li>
                                                    <li>Too much "light" strips life of meaning (Relling's view).</li>
                                                    <li><strong>Comedy:</strong> Gina responds to Gregers' high-minded <Vocab word="allegory" simple="hidden symbolic meaning" /> about light by literally removing a lampshade, grounding his lofty ideals in mundane reality.</li>
                                                </ul>
                                            } />
                                            <TermBox title="The Tableau & Photograph" icon={Camera} color="slate" content={
                                                <ul className="space-y-2">
                                                    <li><strong>Tableau:</strong> The Ekdals pose as a happy family (e.g., Hialmar playing flute). Relling toasts them. Gregers sarcastically calls it the "<Vocab word="tableau" simple="staged picture/scene" /> of filial affection" and refuses to participate, seeking to reveal the deceit.</li>
                                                    <li><strong>Photograph:</strong> Symbolizes the idealized image of the family and their desire for a perfect life. As the play unfolds, it becomes a symbol of shattered illusions.</li>
                                                </ul>
                                            } />
                                        </div>
                                        <Ar>الضوء يُفترض أن يرمز للحقيقة والإنارة (وهي مهمة جريجرز)، لكن إبسن يعكس الرمز بذكاء، فكثير من النور (الحقيقة) يعمي البصيرة ويدمر السعادة ويأتي بالخراب والموت بدلاً من الخلاص. من جانب آخر، الصورة الفوتوغرافية تُعبر عن قدرة هذه الأسرة على "تعديل الواقع" وتجميله ليبدو مثالياً (وهو ما تفعله جينا بتعديل صور الزبائن لتجميل عيوبهم).</Ar>

                                        <div className="bg-slate-800 text-slate-200 p-8 rounded-3xl mt-8">
                                            <h3 className="text-2xl font-bold text-white mb-4 flex items-center gap-2"><Home className="text-slate-400"/> The Garret and Studio</h3>
                                            <div className="space-y-4 text-slate-300">
                                                <p><strong>The Studio:</strong> Cluttered with photographic equipment. Represents a darkroom where the family's fantasies are processed, developed, and altered.</p>
                                                <p><strong>The Garret:</strong> A mysterious, fantastical space associated with the wild duck. It is filled with items from the mythical "Flying Dutchman" (adding a magical seascape allure).</p>
                                                <p><strong>Symbolism:</strong> The garret symbolizes Old Ekdal (the "shipwrecked man"). It is a stage for deeper fantasies where historical time halts, replaced by cosmic/mythical time (highlighted by Hedvig referencing death and an hourglass). The layout physically represents the family's psychological landscape.</p>
                                            </div>
                                            <Ar>المكان نفسه يحمل دلالات عميقة. "الأستوديو" يمثل العالم الحقيقي حيث تُعالَج الأمور وتُجمَّل. بينما "العلية المظلمة" تُمثل العقل الباطن والعالم الخيالي الذي هربت إليه الأسرة للاختباء، حيث يتوقف الزمن تماماً ويسيطر الوهم والأساطير (غابة الصيد الوهمية).</Ar>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 5: REALISM */}
                                {activeTab === 'realism' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <div className="text-center mb-10">
                                            <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 mb-3">Modern Realism</h2>
                                            <p className="text-slate-500 text-lg">Ibsen's portrayal of human complexities and social contradictions.</p>
                                            <Ar>الواقعية الحديثة: كيف صور إبسن تعقيدات الطبيعة البشرية والتناقضات الاجتماعية بأسلوب واقعي بعيداً عن المثاليات القديمة.</Ar>
                                        </div>

                                        <div className="grid md:grid-cols-1 gap-6 overflow-visible">
                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-emerald-500 overflow-visible">
                                                <h4 className="font-bold text-xl text-slate-900 mb-4">Aspects of Realism</h4>
                                                <ul className="space-y-4 text-sm text-slate-600 overflow-visible">
                                                    <li><strong className="text-slate-800 block">Psychological Realism:</strong> Relies on inner struggles rather than external action. The audience connects deeply with these hidden desires.</li>
