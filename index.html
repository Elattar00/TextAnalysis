                                                <Ar>يستغل إياجو شعور عطيل بأنه غريب عن ثقافة البندقية، ويزرع في رأسه حقيقة سامة: "أن نساء البندقية محترفات في الخداع وإخفاء الخيانات عن أزواجهن". هذه الفكرة تدمر ثقة عطيل الساذجة في ديدمونة وفي إمكانية تصديقه لما يراه؛ حيث يُوهمه إياجو بأن عفّة زوجته الظاهرية هي مجرد إخفاء لخطايا خفية، فتشتعل نيران الشك والبارانويا داخله.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-indigo-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">IAGO:</span>do but see his vice.</p>
                                                <p>'Tis to his virtue a just equinox,</p>
                                                <p>The one as long as th'other.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Iago is speaking to Montano, the governor of Cyprus, in Act II. Iago has just purposely gotten Cassio drunk and is now framing him as an irresponsible alcoholic.</p>
                                                <p>Iago frames Cassio's drunkenness visually, telling Montano to 'see his vice' as an exact opposite to his virtue, like night and day. By controlling the chaotic scene that Montano witnesses, Iago dictates what Montano believes about Cassio's character, successfully getting Cassio fired.</p>
                                                <Ar>يُوهِم إياجو حاكم قبرص (مونتانو) بأن إفراط كاسيو في الشرب هو الرذيلة الدائمة التي توازي فضائله. بتأطير هذا الموقف الاستثنائي كـ "دليل بَصري" على سوء سلوك كاسيو المعتاد، ينجح إياجو في التلاعب بنظرة الحاكم للأمور وتوجيهه لعزل كاسيو، مُثبتاً قدرته الفذة على تحريف وتوجيه المشاهد والأحداث لصالح مخططاته.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-emerald-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-slate-600 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">MONTANO:</span>Perhaps he [Othello] sees it not, or his good nature</p>
                                                <p>Prizes the virtue that appears in Cassio</p>
                                                <p>And looks not on his evils. Is not this true?</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Montano is speaking to Iago in Act II in Cyprus. He is reacting to Cassio's drunken behavior, which Iago has carefully staged for him to witness.</p>
                                                <p>Montano uses metaphors of vision to question Othello's judgment as a leader. He assumes Othello is blinded by Cassio's good traits and fails to 'see' his flaws. This proves that Iago's staged illusions are working perfectly, tricking the authorities into trusting what they see over what they actually know.</p>
                                                <Ar>يتساءل مونتانو هنا عما إذا كان عطيل أعمى أو مخدوعاً بفضائل كاسيو الظاهرية ولا يرى حقيقة طيشه (والذي افتعله إياجو أصلاً). هذا الاقتباس يؤكد نجاح مؤامرة إياجو بنسبة 100٪؛ فقد استطاع خداع شخصية ذات منصب رفيع (مونتانو) لدرجة جعله ينتقد ذكاء وبصيرة البطل (عطيل) بدلاً من أن يشكك في الموقف المفتعل نفسه.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-rose-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">IAGO:</span>I'll pour this pestilence into his ear.</p>
                                                <p>That she repeals him for her body's lust;</p>
                                                <p>And by how much she strives to do him good,</p>
                                                <p>She shall undo her credit with the Moor.</p>
                                                <p>So will I turn her virtue into pitch.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Iago is speaking alone in a soliloquy in Act II in Cyprus. He is revealing his evil plan to use Desdemona's kind attempts to help Cassio against her.</p>
                                                <p>Iago vows to reverse the metaphor that goodness equals light. By turning Desdemona's bright virtue into dark 'pitch,' he plans to completely manipulate Othello's perception. He will poison Othello's mind so that every good deed Desdemona does will look like visual proof of her betrayal.</p>
                                                <Ar>يتعهد إياجو بخبث أن يصب "سمّ الشك" في أذن عطيل، مُستغلاً طيبة ديدمونة ودفاعها النبيل عن كاسيو كأداة لتشويه سمعتها. هنا تتجسد عبقرية الشر عند إياجو؛ فهو يقرر تحويل أفضل فضائلها ونقائها (النور المشرق) إلى "قارٍ أسود ولطخات قاتمة"، بحيث كلما حاولت فعل الخير زادت شكوك عطيل فيها وانهارت ثقته.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-purple-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-indigo-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">OTHELLO:</span>By heaven, thou echoest me,</p>
                                                <p>As if there were some monster in thy thought</p>
                                                <p>Too hideous to be shown. Thou dost mean something.</p>
                                                <p>...</p>
                                                <p>As if thou then hadst shut up in thy brain</p>
                                                <p>Some horrible conceit. If thou dost love me,</p>
                                                <p>Show me thy thought.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Othello is speaking to Iago in Act III in Cyprus. Iago is pretending to hide dark, terrible suspicions about Cassio and Desdemona to make Othello curious and paranoid.</p>
                                                <p>Othello frantically demands that Iago 'show' him his hidden thoughts. This proves that Othello still believes thoughts and truths can be seen objectively. He completely falls into Iago's trap, desperately begging to see the very illusions that will destroy his mind and marriage.</p>
                                                <Ar>يطلب عطيل بيأس أن يرى الأفكار المظلمة والموحشة التي يلمّح إليها إياجو وتخفيها كلماته. هذه الاستعطافات والمحاولات اليائسة لـ "رؤية الأفكار" تؤكد مدى وقوع عطيل في الفخ النفسي لإياجو. إن ظن عطيل الخاطئ بأن الأفكار والنوايا قابلة للرؤية والكشف البصري هو ذات الوهم الذي سيُسلمه مستقبلاً للتصديق الأعمى للأدلة المزيفة.</Ar>
                                            </>
                                        } />

                                    </div>
                                )}
                            </div>
                        )}

                        {/* =========================================
                            PLAY VIEW 3: MISS JULIE
                            ========================================= */}
                        {activePlay === 'missJulie' && (
                            <div className="space-y-10">
                                
                                {/* TAB 1: FOUNDATION & PLOT */}
                                {activeTab === 'foundation' && (
                                    <div className="space-y-10 animate-in fade-in duration-300">
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row gap-6 items-center hover:border-rose-200 transition-colors">
                                            <div className="md:w-1/4 flex justify-center">
                                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center border-4 border-white shadow-md text-slate-400">
                                                    <BookOpen size={40} />
                                                </div>
                                            </div>
                                            <div className="md:w-3/4 text-center md:text-left space-y-2">
                                                <h2 className="text-2xl font-black text-slate-800">August Strindberg</h2>
                                                <p className="text-slate-600 text-sm leading-relaxed">
                                                    Written in 1888, <em>Miss Julie</em> is a full-length <Vocab word="naturalistic" simple="realistic/deterministic" /> drama in one act. The play substitutes conventional acts with interludes like a peasant dance and a pantomime, exploring how heredity and social factors determine the characters' futures.
                                                </p>
                                                <Ar>أوجوست ستريندبرغ: كاتب سويدي ورائد في المدرسة الطبيعية. مسرحية الآنسة جولي (1888) هي دراما تُعرض في فصل واحد بلا توقف، وتعالج صراع الطبقات، وغريزة البقاء، وتأثير الوراثة والتربية والظروف المجتمعية الحتمية على تحطيم وإذلال الإنسان بشكل قاسٍ وحقيقي.</Ar>
                                            </div>
                                        </div>

                                        <Section title="Plot Summary" subtitle="Narrative Flow" icon={Map} color="rose">
                                            <div className="bg-white rounded-2xl border border-slate-100 p-6 md:p-10 shadow-sm">
                                                <PlotStep act="I" title="The Dance & The Pantomime" color="rose" description={
                                                    <>
                                                        <p>The play takes place in the kitchen of the Count's manor on Midsummer's Eve. <strong>Jean</strong>, the valet, tells <strong>Christine</strong> the cook about Miss Julie's wild behavior, noting her fiancé abandoned her after she forced him to jump over her riding whip.</p>
                                                        <p>Miss Julie enters and boldly invites Jean to dance. Despite Jean warning her of local gossip, she insists. A pantomime ensues as Christine cleans, followed by Jean and Julie flirting until he mockingly kisses her foot.</p>
                                                        <Ar>تقع أحداث المسرحية بالكامل في مطبخ قصر الكونت (والد جولي) خلال ليلة الاحتفال بمنتصف الصيف. يتحدث الخادم الذكي "جان" مع خطيبته الطباخة "كريستين" عن السلوك المتهور والجنوني للآنسة "جولي"، وكيف أنها أجبرت خطيبها السابق على القفز فوق سوطها ككلب مما أدى لانفصالهما. فجأة تدخل جولي المطبخ، وتكسر كل الحواجز الطبقية بجرأة وتحدٍ، مُجبرةً الخادم "جان" على الرقص معها والتقرب منها متجاهلة تحذيراته المبطنة حول كلام الناس والفروق الاجتماعية بينهما.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="II" title="Dreams & The Rose Terrace" color="rose" description={
                                                    <>
                                                        <p>They share contrasting dreams: Julie dreams of climbing down from a pillar, while Jean dreams of climbing up a tree. Jean tells a childhood story of sneaking into a "Turkish pavilion" (an outhouse) and watching Julie walk on a rose terrace, claiming he was lovesick and attempted suicide.</p>
                                                        <p>When the peasant guests approach singing a dirty song about them, Jean and Julie flee into his room, where the implication is that they have sex.</p>
                                                        <Ar>يتبادل جان وجولي أحلامهما المتناقضة التي تكشف عن دواخلهما؛ جولي تحلم بالسقوط من أعلى عمود (في إشارة لرغبتها الباطنية في التحرر من قيود طبقتها والنزول للقاع)، بينما يحلم جان بتسلق شجرة عالية (في إشارة لطموحه للارتقاء الاجتماعي). للإيقاع بها، يؤلف جان قصة رومانسية كاذبة حول كونه كان مغرماً بها في طفولته لدرجة محاولة الانتحار. وعندما يقترب الفلاحون السكارى من المطبخ وهم يغنون أغنية تلمح لعلاقة بينهما، يقنعها جان بالاختباء في غرفته لحماية سمعتها، وهناك تقع بينهما العلاقة الجنسية التي ستدمر حياتها.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="III" title="The Reversal & The Hotel" color="rose" description={
                                                    <>
                                                        <p>Returning to the kitchen, the power dynamic has reversed. Julie is distraught. Gesturing to the rumor-mongering crowd, Jean declares it is impossible to stay at the manor.</p>
                                                        <p>Jean dreams of traveling to northern Italy to open a hotel, asking Julie to finance it. When she admits she has no money, Jean abruptly cancels the plan, calls her a whore, and reveals that his romantic story of the rose terrace was a complete lie.</p>
                                                        <Ar>بعد خروجهما من الغرفة، تنقلب موازين القوى تماماً؛ تفقد جولي مكانتها الأرستقراطية وتتحول لامرأة منكسرة ومحطمة، بينما يتحول جان إلى شخصية متسلطة ووقحة. يعرض عليها جان خطة للهروب معاً إلى إيطاليا لفتح فندق مستخدمين أموالها. ولكن عندما تعترف جولي بأنها لا تملك أي ثروة شخصية للإنفاق على هذا المشروع، يسقط جان قناعه الرومانسي، ويهينها بأبشع الألفاظ، ويعترف صراحة بأن كل قصص حبه لها كانت مجرد أكاذيب للوصول لغايته.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="IV" title="The Mother's Legacy & The Canary" color="rose" description={
                                                    <>
                                                        <p>Julie explains her man-hating upbringing, revealing her mother ruined the estate and set a fire. After Christine enters, disgusted by their affair, and leaves for church, Julie prepares to flee with her pet canary, Serena.</p>
                                                        <p>Jean insists she leave the bird and brutally decapitates it on a chopping block. Mesmerized and horrified, Julie screams <em>"Kill me too!"</em> and flies into a violent rage against Jean and his entire class.</p>
                                                        <Ar>تحاول جولي تبرير تخبطها وانحرافها النفسي بسرد قصة طفولتها؛ كيف أن والدتها كانت تكره الرجال والتقاليد، وربتها بطريقة مشوهة لتكون نصف رجل ونصف امرأة. تنهار جولي أكثر وتقرر الهرب بمفردها مصطحبة عصفورها الصغير (الكناري). لكن جان يرفض أخذ العصفور معهما، ويقوم بقطع رأسه بوحشية وبدم بارد على لوح التقطيع في المطبخ. هذا العنف الصادم يدمر ما تبقى من عقل جولي، فتصاب بنوبة هستيرية من الغضب والصراخ، وتتمنى الموت وتصب لعناتها على جان وكل الطبقة الدنيا التي يمثلها.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="V" title="The Hypnosis & The Razor" color="rose" isLast={true} description={
                                                    <>
                                                        <p>Julie begs Christine for help to flee and open the hotel, but Christine refuses. Utterly defeated, Julie picks up Jean's razor. Suddenly, the Count's bell rings twice.</p>
                                                        <p>Immobilized by the sound of his master's bell, Jean's bravado vanishes. Julie asks him to hypnotize her and tell her what to do. Jean hands her the razor and commands her to her death, and she walks out the door to commit suicide.</p>
                                                        <Ar>في قمة يأسها، تتوسل جولي للطباخة كريستين لمساعدتها، لكن كريستين ترفض بقسوة متمسكة بقيمها الدينية والطبقية. فجأة، يُسمع صوت جرس الكونت (والد جولي) معلناً عودته للقصر. هذا الصوت يُرعب جان ويحوله في ثوانٍ من رجل متسلط إلى خادم جبان يرتجف خوفاً من سيده. جولي، التي فقدت كل إرادتها وشرفها ولم يعد لديها مفر من الفضيحة، تطلب من جان أن يُنوّمها مغناطيسياً ويأمرها بما يجب فعله. يناولها جان شفرة الحلاقة ويأمرها بالانتحار، فتخرج جولي بهدوء لتنهي حياتها وتتخلص من العار.</Ar>
                                                    </>
                                                } />
                                            </div>
                                        </Section>
                                    </div>
                                )}

                                {/* TAB 2: CHARACTERS */}
                                {activeTab === 'characters' && (
                                    <div className="space-y-6 animate-in fade-in duration-300 overflow-visible">
                                        <div className="bg-slate-800 text-white p-8 rounded-3xl mb-8 shadow-lg">
                                            <h2 className="text-3xl font-black mb-4 flex items-center gap-3">
                                                <Users className="text-rose-400"/> Dramatis Personae
                                            </h2>
                                            <p className="text-slate-300 text-lg leading-relaxed mb-6">
                                                Strindberg's characters are profoundly shaped by their environments, genetics, and social status, acting as true naturalistic subjects.
                                            </p>
                                            <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                                <h4 className="font-bold text-rose-300 mb-2 uppercase tracking-widest text-xs">Minor Characters & Entities</h4>
                                                <p className="text-sm text-slate-300">
                                                    <strong className="text-white">The Count:</strong> (Miss Julie's absent father) • <strong className="text-white">Diana:</strong> (Miss Julie's dog) • <strong className="text-white">Serena:</strong> (Miss Julie's canary)
                                                </p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-6 overflow-visible">
                                            <CharacterCard name="Miss Julie" role="The Fallen Aristocrat" icon={Sparkles} color="rose" details={
                                                <>
                                                    <p><strong>Background:</strong> The twenty-five-year-old tragic heroine. She lacks confidence in her identity, the result of a confused and genderless upbringing instilled by her mother.</p>
                                                    <p><strong>Personality:</strong> She attempts to be dominant and flirts openly with the valet, acting out her many insecurities. Her dream of falling from a pillar reflects her subconscious urge to descend.</p>
                                                    <p><strong>The Collapse:</strong> After being seduced, she completely falls to pieces when trying to reassert her dominance. Terrified of her father's judgment, she finally sacrifices herself to the power of suggestion the valet uses over her weak will.</p>
                                                    <Ar>الآنسة جولي (Miss Julie): الأرستقراطية الساقطة (25 عاماً). فتاة معقدة نفسياً نشأت على كراهية الرجال وتخبط في هويتها الجندرية بسبب والدتها المريضة. تُظهر تمرداً وغروراً ظاهرياً وتتعمد إذلال الرجال والعبث بالحدود الطبقية بإغواء خادمها. وبمجرد وقوع الخطأ الذي ينزع عنها غطاء الشرف الأرستقراطي، تنهار تماماً، وتتحول لعبدة ذليلة لإرادة جان لتنهي حياتها خوفاً من الفضيحة ووالدها الكونت.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Jean" role="The Ambitious Valet" icon={Briefcase} color="rose" details={
                                                <>
                                                    <p><strong>Background:</strong> The manor's thirty-year-old valet. He has a small amount of sophisticated work experience but remains in a menial position.</p>
                                                    <p><strong>Personality:</strong> Self-preservation is key to his character. He takes advantage of a coincidence of need to seduce Julie. However, his humble origins render him completely servile the moment the Count's bell rings.</p>
                                                    <p><strong>Manipulation:</strong> When he realizes Julie has no money, he discards their plans to protect his job. He uses his psychological and hypnotic powers of suggestion to force her into suicide, ensuring his own survival.</p>
                                                    <Ar>جان (Jean): الخادم الطموح (30 عاماً). يمتلك ثقافة مكتسبة ولباقة وذكاءً حاداً وطموحاً للارتقاء لمصاف السادة. هو متلاعب أناني وبراغماتي؛ يستغل تخبط جولي للإيقاع بها بكلماته المعسولة الكاذبة، ثم ينقلب عليها ليعاملها باحتقار وإذلال عنيف. لكنه في النهاية يفشل في تخطي طبقته الأصلية؛ فصوت جرس سيده الكونت كفيل بكسر شوكته وإعادته خادماً خائفاً ممتثلاً للأوامر.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Christine" role="The Pragmatic Cook" icon={Home} color="rose" details={
                                                <>
                                                    <p><strong>Background:</strong> The manor's thirty-five-year-old cook and Jean's fiancée. Her union with Jean seems more casual than serious.</p>
                                                    <p><strong>Personality:</strong> She is religious, and her moral code (along with jealousy) leads her to strongly disapprove of Jean and Julie's reckless behavior.</p>
                                                    <p><strong>Strength:</strong> She doesn't believe their unrealistic plans for escape. She alone has the true strength and determination to leave on her own to save her self-respect, completely rejecting Julie's desperate pleas for help.</p>
                                                    <Ar>كريستين (Christine): الطباخة وخطيبة جان. تمثل القيم الراسخة المحافظة والدين والطبقة العاملة الراضية بواقعها. هي واقعية تامة لا تنطلي عليها أحلام جان الواهمة ولا تعاطفها انكسارات جولي الفاسدة. رفضها الحاسم لمساعدة جولي يمثل رفض المجتمع لتقبل التجاوزات الطبقية والأخلاقية، وهي الوحيدة التي تنجو وتغادر بصورة مستقرة.</Ar>
                                                </>
                                            } />
                                        </div>
                                    </div>
                                )}

                                {/* TAB 3: THEMES */}
                                {activeTab === 'themes' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <Section title="Power & Psychological Warfare" subtitle="The Struggle for Dominance" icon={Scale} color="rose">
                                            <div className="mb-4">
                                                Their relationship is not based on love, but on control, dominance, and psychological manipulation. Each character tries to gain superiority over the other using different weapons.
                                            </div>
                                            <Ar title="السلطة والحرب النفسية">
                                                لا توجد رومانسية في علاقة جولي وجان، بل هي صراع مرير للسيطرة والتفوق النفسي على الآخر باستخدام مختلف الأسلحة.
                                            </Ar>

                                            <ComparisonTable title="Weapons of Warfare" leftTitle="Miss Julie (Social)" rightTitle="Jean (Psychological)" color="rose" rows={[
                                                {
                                                    left: <div className="space-y-2">
                                                        <strong className="text-rose-700 block">Aristocratic Privilege</strong>
                                                        <p>Julie begins with social power due to her noble status. She uses her authority as the Count's daughter and her sexual attraction to test and provoke Jean.</p>
                                                    </div>,
                                                    right: <div className="space-y-2">
                                                        <strong className="text-slate-700 block">Emotional Intelligence</strong>
                                                        <p>Jean appears socially weaker, but he possesses manipulation skills. He reads her emotional weakness, flatters her pride, and slowly breaks her confidence.</p>
                                                    </div>
                                                }
                                            ]} />
                                            <Ar>قارن الكاتب بين سلطة جولي الاجتماعية الهشة والمبنية على اللقب الأرستقراطي فقط، وبين ذكاء جان النفسي والمستمد من قوة التلاعب وغريزة البقاء لدى الطبقات الكادحة، والذي ينجح في قلب المعادلة وتحطيم سيدته بالكامل.</Ar>
                                        </Section>

                                        <div className="grid md:grid-cols-2 gap-6 overflow-visible">
                                            <TermBox title="Collapse of Class Boundaries" icon={Users} color="slate" content={
                                                <ul className="space-y-2">
                                                    <li>Strindberg deliberately reverses the social hierarchy throughout the play.</li>
                                                    <li>The aristocracy (Julie) is shown as decaying, weak, and confused.</li>
                                                    <li>The lower class (Jean) is shown as highly ambitious but morally flexible.</li>
                                                    <li>The play suggests that class identity is fragile and collapses completely under psychological pressure.</li>
                                                </ul>
                                            } />
                                            <TermBox title="Instinct vs. Civilization" icon={Zap} color="slate" content={
                                                <ul className="space-y-2">
                                                    <li>Civilization is presented as a "big scam"—a hypocritical system of artificial manners and social masks.</li>
                                                    <li>Midsummer Night symbolizes temporary freedom where animal instinct, passion, and natural desire surface.</li>
                                                    <li>Beneath polite civilized behavior, humans are still driven strictly by survival, ambition, and domination.</li>
                                                </ul>
                                            } />
                                        </div>
                                        <Ar>
                                            **انهيار الحواجز الطبقية:** الطبقة الأرستقراطية القديمة في حالة تداعي واضمحلال وضعف كجولي، بينما الطبقة العاملة طموحة وتناضل للبقاء والارتقاء كجان.<br/><br/>
                                            **الغريزة مقابل التحضر:** التحضر والقواعد ليست إلا قشرة هشة زائفة فوق الغرائز البشرية البحتة المتمثلة في الشهوة والسيطرة وصراع البقاء. ليلة منتصف الصيف بكل طقوسها الوثنية القديمة هي العامل الذي يذيب تلك القشرة ويفجر الصراع الحيواني بداخلهم.

                                        <Section title="The Kitchen" subtitle="The Social Boundary" icon={Home} color="rose">
                                            <div className="text-lg mb-6">
                                                In <em>Miss Julie</em>, the kitchen is not just a physical space; it is a powerful symbol that represents class hierarchy, social tension, and psychological struggle.
                                            </div>
                                            
                                            <div className="grid md:grid-cols-3 gap-4 overflow-visible">
                                                <div className="bg-rose-50 p-5 rounded-xl border border-rose-100 overflow-visible">
                                                    <strong className="text-rose-900 block mb-2">Class Instability</strong>
                                                    <p className="text-sm text-rose-800">By stepping into the servants' space, Julie steps down from her privilege. It shows class boundaries are not fixed, and causes her to lose authority and dignity.</p>
                                                </div>
                                                <div className="bg-rose-50 p-5 rounded-xl border border-rose-100 overflow-visible">
                                                    <strong className="text-rose-950 block mb-2">Psychological Arena</strong>
                                                    <p className="text-sm text-rose-800">It is a confined, intimate space where social masks drop. Jean gains dominance here because he feels more "at home" and confident in this environment than she does.</p>
                                                </div>
                                                <div className="bg-rose-50 p-5 rounded-xl border border-rose-100 overflow-visible">
                                                    <strong className="text-rose-900 block mb-2">Reality vs. Illusion</strong>
                                                    <p className="text-sm text-rose-800">The aristocratic world represents artificial appearance and status, while the kitchen represents raw, physical reality, work, and survival.</p>
                                                </div>
                                            </div>
                                            <Ar>رمزية المطبخ: ليس مجرد مكان للطبخ، بل هو معترك الصراع الطبقي والنفسي الدنيء. نزول جولي من الطوابق العلوية (الأرستقراطية الوهمية والأقنعة المجتمعية) إلى المطبخ (القاع، الطبقة الكادحة، والغرائز المادية وصراع البقاء الأساسي) هو تجريد متكامل لسلطتها وحرمانها من درعها الطبقي المتمثل في لقبها وتواجدها المألوف، مما يسهل لجان اصطيادها نفسياً لأنه في بيئته وملعبه الحقيقي الذي يفهمه جيداً.</Ar>

                                            <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 mb-3">Critical Analysis</h2>
                                            <p className="text-slate-500 text-lg">Strindberg's masterpiece of naturalistic theatre.</p>
                                            <Ar>التحليل النقدي: تحفة ستريندبرغ في المسرح الطبيعي والحتمي.</Ar>

                                        <Section title="Psychological Breakdown" subtitle="The Identity Crisis" icon={BrainCircuit} color="rose">
                                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 overflow-visible">
                                                <ul className="space-y-4 text-sm text-slate-700 overflow-visible">
                                                    <li><strong><span className="text-rose-700">Trapped Between Worlds:</span></strong> Julie suffers a deep identity crisis. She is trapped between being an aristocrat vs. common humanity, strength vs. weakness, masculine authority vs. feminine vulnerability.</li>
                                                    <li><strong><span className="text-rose-700">Maternal Influence:</span></strong> Her mother raised her with confused ideas about men, women, and authority. She wants power like a man but is judged socially as a woman.</li>
                                                    <li><strong><span className="text-rose-700">The Point of No Return:</span></strong> After her affair, she realizes she has crossed social boundaries and cannot return to her past life, but she also cannot belong to Jean's world. She belongs nowhere.</li>
                                                    <li><strong><span className="text-rose-700">Total Defeat:</span></strong> Her mind fills with shame and helplessness. Jean's final control over her reflects her total psychological collapse, destroyed by social pressure and internal confusion.</li>
                                                </ul>
                                            </div>
                                            <Ar title="أزمة الهوية والانهيار النفسي">
                                                يوظف الكاتب المدرسة الطبيعية لإظهار أن تصرفات جولي لم تكن خياراً حراً، بل هي نتيجة حتمية وبيولوجية وتنشئة مجتمعية فاسدة من أمها. هي محاصرة بشدة بين رغبتها في السلطة الذكورية وقيود المجتمع التي تحاسبها كامرأة. عند سقوطها وخطيئتها، تكتشف أنها فقدت عالمها الأرستقراطي ولن تنتمي لعالم الخدم الدنيء أبداً، فتقع في شباك عار مدمر يحطم كل مقاومة بداخلها ويسلمها للإيحاء النفسي المنوّم من قبل خادمها الذي يدفعها لتدمير نفسها.

                        {/* =========================================
                            PLAY VIEW 4: THE TAMING OF THE SHREW
                            ========================================= */}
                        {activePlay === 'tamingOfTheShrew' && (
                            <div className="space-y-10">
                                
                                {/* TAB 1: FOUNDATION & PLOT */}
                                {activeTab === 'foundation' && (
                                    <div className="space-y-10 animate-in fade-in duration-300">
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row gap-6 items-center hover:border-amber-200 transition-colors">
                                            <div className="md:w-1/4 flex justify-center">
                                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center border-4 border-white shadow-md text-slate-400">
                                                    <BookOpen size={40} />
                                                </div>
                                            </div>
                                            <div className="md:w-3/4 text-center md:text-left space-y-2">
                                                <h2 className="text-2xl font-black text-slate-800">William Shakespeare</h2>
                                                <p className="text-slate-600 text-sm leading-relaxed">
                                                    <em>The Taming of the Shrew</em> is a Shakespearean comedy about Petruchio, a man who marries the headstrong, "shrewish" Katherina (Kate) for her fortune, then uses psychological tactics and deprivation to "tame" her into an obedient wife. While she submits, her sister Bianca marries for love, and the play ends with a banquet demonstrating Kate's total transformation.
                                                </p>
                                                <Ar>ويليام شكسبير: "ترويض الشرسة" هي كوميديا مسرحية تدور أحداثها حول "بتروكيو" الشاب الطامع في الثروة الذي يتزوج من الفتاة الغنية وسليطة اللسان والمتمردة "كاثرينا". يستخدم معها حيلاً نفسية عنيفة من تجويع وسلب للإرادة وتناقض متعمد بغرض "ترويضها" وإجبارها على الطاعة لتكون زوجة مثالية وخاضعة للتقاليد.</Ar>
                                            </div>
                                        </div>

                                        <Section title="Plot Summary" subtitle="Narrative Flow" icon={Map} color="amber">
                                            <div className="bg-white rounded-2xl border border-slate-100 p-6 md:p-10 shadow-sm">
                                                <PlotStep act="I" title="The Induction" color="amber" description={
                                                    <>
                                                        <p>In the English countryside, a poor drunken tinker named <strong>Christopher Sly</strong> becomes the target of a prank by a local lord. The lord's men dress Sly in finery and convince him he is a nobleman who has been insane for years.</p>
                                                        <p>Sly accepts this when he hears of his "wife" (a pageboy in disguise). A troupe of actors arrives to present a play for his entertainment—this play makes up the main story of <em>The Taming of the Shrew</em>.</p>
                                                        <Ar>تبدأ المسرحية بمقدمة كوميدية (مقلب) يقيمه لورد غني ضد رجل فقير وسكير يُدعى "كريستوفر سلاي" بعد أن وجده نائماً في الشارع. يقوم رجال اللورد بتلبيس سلاي ملابس أمراء فاخرة، وعندما يستيقظ، يوهمونه بأنه لورد عظيم كان يعاني من الجنون وفقدان الذاكرة لسنوات، وأن له زوجة مطيعة (وهي في الواقع خادم يتنكر بزي امرأة). لتكتمل الخدعة، يتم استدعاء فرقة مسرحية لتقديم عرض للترفيه عن هذا "اللورد" المزيف. المسرحية التي يشاهدها سلاي هي القصة الأساسية التي نعرفها باسم "ترويض الشرسة".</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="II" title="Arrival in Padua" color="amber" description={
                                                    <>
                                                        <p>In Padua, <strong>Lucentio</strong> arrives for university but instantly falls in love with <strong>Bianca</strong>. However, her wealthy father, <strong>Baptista</strong>, declares Bianca cannot marry until her older sister, the ill-tempered <strong>Katherine</strong>, is wed.</p>
                                                        <p>Lucentio and another suitor, Hortensio, disguise themselves as tutors to court Bianca secretly, while Tranio disguises himself as Lucentio to officially bid for her hand. Meanwhile, <strong>Petruchio</strong> arrives from Verona seeking a rich wife and agrees to marry Katherine sight unseen for her fortune.</p>
                                                        <Ar>في مدينة بادوا، يصل الشاب "لوسينتيو" لاستكمال دراسته، لكنه يقع في حب الفتاة الجميلة والرقيقة "بيانكا" من النظرة الأولى. المشكلة أن والدها الثري "بابتيستا" وضع شرطاً صارماً: لن تتزوج بيانكا حتى تتزوج أختها الكبرى "كاثرينا"، وهي فتاة متمردة ومعروفة بلسانها السليط وغضبها الدائم، مما ينفر الخطاب منها. يتنكر لوسينتيو وخاطب آخر يُدعى "هورتينسيو" في هيئة معلمين للتقرب من بيانكا سراً. في هذه الأثناء، يصل "بتروكيو" باحثاً عن الثروة والمال فقط، ويوافق على الزواج من كاثرينا بمجرد علمه بثروة والدها الضخمة، متجاهلاً شخصيتها الشرسة.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="III" title="The Absurd Wedding & Taming Begins" color="amber" description={
                                                    <>
                                                        <p>Petruchio engages Katherine in a tremendous duel of words, twisting her insults and falsely telling Baptista she has consented. On Sunday, Petruchio is late to his own wedding, finally arriving in ridiculous clothes on a broken-down horse.</p>
                                                        <p>After forcing Katherine to leave before the wedding feast, Petruchio takes her to his country house. He begins "taming" her by depriving her of food and sleep, pretending it is out of deep love because the food and bed are supposedly inferior.</p>
                                                        <Ar>يلتقي بتروكيو بكاثرينا ويدخل معها في معركة كلامية عنيفة، حيث يتجاهل إهاناتها ويرد عليها ببرود ومكر، ثم يكذب على والدها مدعياً أنها وافقت على الزواج منه بحب. وفي يوم الزفاف، يتعمد بتروكيو إهانة كاثرينا بشكل علني؛ فيصل متأخراً جداً، ويرتدي ملابس رثة ومضحكة، ويتصرف بهمجية أثناء المراسم. وبمجرد انتهاء الزفاف، يجبرها على المغادرة معه فوراً قبل حتى أن تحضر حفل زفافها الخاص. يأخذها لمنزله الريفي ويبدأ هناك خطته القاسية لـ "ترويضها" كما تُروّض الصقور البرية.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="IV" title="Submission & Secret Elopements" color="amber" description={
                                                    <>
                                                        <p>In Padua, Lucentio wins Bianca's heart. Tranio secures Baptista's approval by proposing a huge sum of money, tricking a passing pedant into playing Lucentio's father to confirm the funds. Amidst the comedic confusion of the real father's arrival, Lucentio and Bianca elope.</p>
                                                        <p>On the road back to Padua, Petruchio forces Katherine to agree to absurdities—calling the sun the moon and an old man a young maiden. Broken and exhausted, Katherine's willfulness dissipates, and she submits completely.</p>
                                                        <Ar>يستخدم بتروكيو أسلوب التعذيب النفسي والجسدي المغلف بـ "الحب". فهو يحرم كاثرينا من الطعام والنوم، متظاهراً بأنه يفعل ذلك لأن الطعام غير مطهو جيداً والفراش ليس مريحاً بما يليق بها! من جهة أخرى، ينجح لوسينتيو في كسب قلب بيانكا والهرب معها ليتزوجا سراً. أثناء عودة بتروكيو وكاثرينا إلى بادوا، يبلغ الترويض ذروته عندما يجبر بتروكيو كاثرينا المنهكة على الموافقة على تصريحات عبثية تماماً (مثل أن تسمي الشمس قمراً، أو تشير لرجل عجوز على أنه فتاة شابة). تدرك كاثرينا أن معارضته تجلب لها العذاب، فتستسلم تماماً لجنونه وتوافقه على كل شيء لتنال الراحة.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="V" title="The Banquet & The Wager" color="amber" isLast={true} description={
                                                    <>
                                                        <p>At a banquet celebrating three marriages (Lucentio/Bianca, Petruchio/Kate, and Hortensio/a Widow), the men wager on whose wife is the most obedient.</p>
                                                        <p>Everyone expects Bianca to win, but she refuses to obey the summons. Katherine comes immediately. Petruchio orders her to explain a wife's duty, and she gives a long speech advocating absolute loyalty and submission to husbands. Petruchio wins an astonishing victory, and the couple leaves to go to bed.</p>
                                                        <Ar>تُختتم المسرحية بوليمة كبرى تجمع ثلاث زيجات. خلال الحفل، يتحدى الرجال الثلاثة بعضهم البعض في رهان مالي حول "من يمتلك الزوجة الأكثر طاعة". يتوقع الجميع أن تفوز بيانكا الرقيقة، لكن المفاجأة تقع عندما ترفض بيانكا الاستجابة لنداء زوجها. في المقابل، تأتي كاثرينا فوراً بمجرد أن يطلبها بتروكيو. يطلب منها بتروكيو أن تشرح للزوجات الأخريات واجبات الزوجة، فتلقي كاثرينا خطاباً درامياً طويلاً تؤكد فيه على خضوع المرأة المطلق وطاعتها لزوجها، ليفوز بتروكيو بالرهان، وسط جدل مستمر بين النقاد حول ما إذا كانت كاثرينا قد تروضت حقاً أم أنها تتلاعب بالجميع.</Ar>
                                                    </>
                                                } />
                                            </div>
                                        </Section>
                                    </div>
                                )}

                                {/* TAB 2: CHARACTERS */}
                                {activeTab === 'characters' && (
                                    <div className="space-y-6 animate-in fade-in duration-350 overflow-visible">
                                        <div className="bg-slate-800 text-white p-8 rounded-3xl mb-8 shadow-lg">
                                            <h2 className="text-3xl font-black mb-4 flex items-center gap-3">
                                                <Users className="text-amber-400"/> Dramatis Personae
                                            </h2>
                                            <p className="text-slate-300 text-lg leading-relaxed mb-6">
                                                Shakespeare creates a vivid cast exploring performativity, wealth, and power in courtship.
                                            </p>
                                            <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                                <h4 className="font-bold text-amber-300 mb-2 uppercase tracking-widest text-xs">Extensive Minor Characters Checklist</h4>
                                                <p className="text-sm text-slate-300 leading-relaxed">
                                                    <strong className="text-white">Biondello & Grumio:</strong> (Servants) • <strong className="text-white">Gremio:</strong> (Rich old suitor) • <strong className="text-white">Christopher Sly:</strong> (Drunken tinker) • <strong className="text-white">Vincentio:</strong> (Lucentio's real father) • <strong className="text-white">Widow:</strong> (Marries Hortensio) • <strong className="text-white">The Staff & Citizens:</strong> Haberdasher, Hostess, Huntsmen (1,2,3), Joseph, Lord, Merchant, Messenger, Nathaniel, Nicholas, Officer, Page, Peter, Phillip, Players, Tailor.
                                                </p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-6 overflow-visible">
                                            <CharacterCard name="Petruchio" role="The Veronese Fortune-Hunter" icon={ShieldAlert} color="amber" details={
                                                <>
                                                    <p><strong>Background:</strong> A man from Verona who comes to Padua with one purpose: to marry into money. He agrees to woo Katherine for her fortune.</p>
                                                    <p><strong>The Tamer:</strong> After the wedding, Petruchio sets about "taming" Katherine by treating her harshly, using extreme psychological and physical manipulation (denying her food and sleep), and pretending to have violent mood swings to mirror her own behavior.</p>
                                                    <Ar>بتروكيو: صائد الجوائز الوافد من فيرونا بهدف وحيد وهو الزواج من فتاة ثرية، غير مبالٍ بسوء سمعتها. يعتمد طريقة "ترويض الصقور البرية" لتطويع زوجته الشرسة كاثرينا، باستخدام الحرمان والقسوة المغلفة بالاهتمام، ليجبرها تدريجياً على التنازل عن شخصيتها المستقلة والرضوخ التام لمطالبه العبثية لتستقر حياتها.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Katherine" role="The 'Shrew'" icon={Zap} color="amber" details={
                                                <>
                                                    <p><strong>Background:</strong> The elder of Baptista Minola's two daughters, notorious for her shrewish, hot-tempered behavior, which makes finding a willing husband difficult.</p>
                                                    <p><strong>The Transformation:</strong> Initially dismayed and angered by Petruchio's rude behavior, she puts up a mighty struggle. However, under his intense psychological conditioning, she eventually gives in and submits to his taming efforts.</p>
                                                    <Ar>كاثرينا (الشرسة): الابنة الكبرى الغاضبة والمتمردة بقوة على القيود الذكورية والمجتمع المادي. هي ذكية ولديها حضور قوي وتستخدم لسانها السليط للدفاع عن نفسها ضد تحويلها لسلعة تجارية. في النهاية تتحطم دفاعاتها وتتحول بطريقة مثيرة للجدل للزوجة المثالية الخاضعة والمدافعة بقوة عن حقوق الأزواج على زوجاتهم.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Bianca" role="The Mild Sister" icon={Sparkles} color="amber" details={
                                                <>
                                                    <p><strong>Background:</strong> The younger daughter of Baptista. She is the opposite of her sister—sweet, mild, studious, and loves books and music.</p>
                                                    <p><strong>The Suitors' Prize:</strong> She is highly desired by many suitors. She initially doubts Lucentio but eventually agrees to marry him in secret. However, at the final banquet, she refuses to obey his commands, revealing a hidden stubborn streak.</p>
                                                    <Ar>بيانكا: الاخت الصغرى الرقيقة والناعمة التي يتسابق الجميع لخطبتها لأنها تظهر كأنها الزوجة التقليدية المطيعة والمثالية. ومع ذلك، يكشف الفصل الأخير أنها في الواقع عنيدة ومخادعة؛ فهي تتجاهل أوامر زوجها في وليمة الرهان، مما يكسر الصورة النمطية البريئة عنها ويثبت أنها تجيد التمثيل على الرجال.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Baptista Minola" role="The Wealthy Merchant" icon={Briefcase} color="amber" details={
                                                <>
                                                    <p><strong>Background:</strong> A rich Paduan who insists on marrying off his elder daughter before Bianca can be courted.</p>
                                                    <p><strong>The Businessman:</strong> Although affable, he is oblivious to his daughters' real wishes (mistaking Kate's tears of anger for disappointment). He arranges marriages strictly based on money, viewing the man who can offer the biggest dower as the ideal son-in-law.</p>
                                                    <Ar>بابتيستا: الأب الثري. يعامل الزواج كتجارة ومزايدة بحتة محاولاً تأمين أكبر مهر مادي لبناته. قراره الأناني بمنع زواج ابنته الصغرى حتى تتزوج الكبرى غير المرغوبة (كاثرينا) هو المحرك الأساسي لأحداث التخفي والمكائد والتعجيل بخطبة كاثرينا.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Lucentio" role="The Disguised Lover" icon={BookOpen} color="amber" details={
                                                <>
                                                    <p><strong>Background:</strong> A young student from Pisa who falls in love with Bianca at first sight.</p>
                                                    <p><strong>The Scheme:</strong> He disguises himself as a language tutor named "Cambio" to court Bianca in secret. He eventually casts off his disguise and elopes with her.</p>
                                                    <Ar>لوسينتيو: الشاب الرومانسي الذي يقع في غرام بيانكا السطحي من النظرة الأولى. يمثل الحب الرومانسي الساذج المعتمد على التنكر والخداع متناقضاً بقوة مع الزواج العملي الفج لبتروكيو وكاثرينا.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Hortensio" role="The Rival Suitor" icon={HeartHandshake} color="amber" details={
                                                <>
                                                    <p><strong>Background:</strong> An old friend of Petruchio and an admirer of Bianca.</p>
                                                    <p><strong>The Pivot:</strong> He disguises himself as a music teacher to sneak poems to Bianca. After seeing her choose Lucentio, he gives up and hastily marries a wealthy widow instead.</p>
                                                    <Ar>هورتينسيو: أحد خُطاب بيانكا الذي يتنكر كمعلم موسيقى. يستسلم بسرعة عندما تفضّل بيانكا منافسه عليه، ويتزوج من أرملة ثرية براغماتية أثبتت تمرداً مشابهاً لتصرفات بيانكا غير المطيعة في النهاية.</Ar>

                                                    <Ar>ترانيو: الخادم الماكر والذكي المخلص للوسينتيو. يتقمص شخصية سيده ببراعة تامة للتفاوض على المهر والتلاعب بالأب، مبرزاً قدرة الخدام (الطبقة البسيطة) على تجاوز أسيادهم في الدهاء والخداع اللفظي، ومسلطاً الضوء على ثيمة الملابس والمظاهر التي تخدع الناس.</Ar>

                                        <Section title="Power and Control in Marriage" subtitle="The Hierarchy of Obedience" icon={Scale} color="amber">
                                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 overflow-visible text-sm text-slate-700 space-y-4">
                                                <p>At the heart of the play is the power struggle between Kate and Petruchio. Petruchio uses extreme psychological manipulation to break her resistance, treating marriage as a space where the husband must have absolute authority.</p>
                                                <p>Kate transforms from an independent woman resisting social expectations into a subservient wife. This transformation raises deep questions about whether she is truly "tamed" or simply adapting to survive his games by blurring the line between appearance and reality.</p>
                                            </div>
                                            <Ar title="السلطة والسيطرة داخل مؤسسة الزواج">
                                                تركز الكوميديا شكسبير على الصراع العنيف للسلطة الذكورية وتأكيد الهيمنة الأبوية داخل الزواج. بتروكيو يستخدم الحرمان النفسي لكسر مقاومة كاثرينا القوية لفرض السيطرة المطلقة. لكن الجدل يظل قائماً: هل استسلمت كاثرينا حقيقة وأصبحت مطيعة لزوجها، أم أنها اكتشفت أن "لعبة الطاعة والتملق الزائف" هي الحل الوحيد للبقاء والتمتع بالسلام في هذا المجتمع الذكوري القاسي؟
                                            </Ar>
                                        </Section>
                                        
                                        <Section title="Marriage as an Economic Institution" subtitle="Courtship as Commerce" icon={Briefcase} color="amber">
                                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 overflow-visible text-sm text-slate-700 space-y-4">
                                                <p>Unlike other comedies, this play focuses heavily on the stark economic realities of Renaissance marriage. Inner emotional desire plays only a secondary role.</p>
                                                <p>Courtship is a transaction negotiated between the future husband and the father. Baptista openly auctions Bianca off to the highest bidder. Lucentio wins her only by proving he is fabulously wealthy. Financial considerations completely outweigh affection.</p>
                                            </div>
                                            <Ar title="الزواج كمؤسسة تجارية بحتة">
                                                في هذه المسرحية (وعلى عكس الرومانسيات الحالمة كـ روميو وجولييت)، الزواج لا يدور حول الحب والمشاعر بل يعتمد حرفياً على الصفقات والمزادات التجارية العلنية والمهر المادي. الحب والرغبة أمور ثانوية تأتي بعد تأمين وضمان الميراث والتفاوض المادي القاسي بين الخطاب والآباء.
                                            </Ar>

                                            <TermBox title="Social Roles & Happiness" icon={Users} color="slate" content={
                                                <ul className="space-y-3">
                                                    <li>Society strictly defines behavior based on wealth, gender, and class. Kate becomes miserably unhappy because she refuses her assigned role.</li>
                                                    <li>Many characters attempt to bypass these roles through disguise (Lucentio, Tranio, Sly).</li>
                                                    <li>Ultimately, the play illustrates that conventional order must be reestablished for society to function, and personal happiness is achieved by harmonizing with that strict order.</li>
                                                </ul>
                                            } />
                                            <TermBox title="Mandated Gender Roles" icon={BrainCircuit} color="slate" content={
                                                <ul className="space-y-3">
                                                    <li>The play equates masculinity with dominance and femininity with subservience. Transgressions against these roles are severely punished.</li>
                                                    <li>Katherine is ridiculed and physically/psychologically abused by Petruchio until she conforms to the picture of subservient femininity.</li>
                                                    <li>Whether her final speech is genuine or ironic, she remains trapped in a misogynistic society that demands strict adherence to gender roles.</li>
                                                </ul>
                                            } />
                                        </div>
                                        <Ar>
                                            **الأدوار الجندرية والمجتمعية الصارمة:** يُطالب المجتمع الإنجليزي في عصر النهضة بأدوار محددة للرجال (القيادة والسيطرة) والنساء (التبعية والخضوع المطلق والتزام الصمت). كاثرينا تتعرض للإيذاء النفسي حتى تندمج وتتقبل هذا القالب النمطي المجتمعي وتثبت أن السعادة المجتمعية في تلك الفترة ترتبط فقط بالاستسلام للقواعد وعدم التمرد عليها، سواء من قِبل الخدم (كـ ترانيو) أو الزوجات.

                                            <div className="grid md:grid-cols-3 gap-4 overflow-visible mt-4">
                                                <div className="bg-amber-50 p-5 rounded-xl border border-amber-100 overflow-visible">
                                                    <strong className="text-amber-900 block mb-2">Petruchio's Wedding Costume</strong>
                                                    <p className="text-sm text-amber-800">Arriving in ridiculous, mismatched rags symbolizes his absolute authority. He shows Kate he can behave however he pleases without consequence, proving that the man beneath matters more than the superficial clothing.</p>
                                                </div>
                                                <div className="bg-amber-50 p-5 rounded-xl border border-amber-100 overflow-visible">
                                                    <strong className="text-amber-955 block mb-2">The Cap and Gown</strong>
                                                    <p className="text-sm text-amber-800">Petruchio denies Kate the beautiful haberdasher's clothes she desires, demonstrating her total loss of autonomy. Her outward appearance and desires are entirely subject to his whims.</p>

                                                    <strong className="text-amber-900 block mb-2">Animals</strong>
                                                    <p className="text-sm text-amber-800">Kate is frequently compared to animals (a shrew, a wild cat, a falcon). This symbolizes her commodification as a piece of "livestock" property, and represents Petruchio's desire to domesticate her true nature.</p>
                                                </div>
                                            </div>
                                            <Ar>الرموز الرئيسية: (1) ثياب الزفاف المضحكة لبتروكيو تثبت سلطته المطلقة وقدرته على كسر الأعراف لفرض إرادته. (2) تمزيق القبعة والثوب الفاخر الذي كانت تتمناه كاثرينا يدل على سيطرة الزوج وتحطيم إرادتها في التحكم حتى في مظهرها الشخصي. (3) التشبيه المتكرر بالحيوانات الأليفة المفترسة كالصقور يؤكد على نظرتهم للمرأة كممتلكات وحيوان يجب تطويعه وتدجينه وترويضه بالقوة لخدمة الرجل.</Ar>

                                                <ul className="space-y-4">
                                                    <li><strong>Disguise:</strong> Characters constantly use costumes to transgress social barriers (Tranio as a lord, Lucentio as a tutor). The play asks if clothes make the man, ultimately answering "no," as true natures are always uncovered.</li>
                                                    <li><strong>Domestication:</strong> The rhetoric of "taming" dominates the action. Petruchio trains Katherine like a wild falcon, intending to "kill a wife with kindness" in what Hortensio calls a "taming-school."</li>
                                                    <li><strong>Fathers and Children:</strong> Marriages do not merely concern the bride and groom, but their parents. Fathers (Baptista, Vincentio, the fake pedant) are heavily involved in transferring responsibility and negotiating the economic transactions of their children.</li>
                                                </ul>
                                            } />
                                            <Ar>التخفي والترويض: مسرحية التخفي والملابس تطرح تساؤلاً حول هل المظاهر والألقاب تصنع الناس حقاً؟ الإجابة لا لأن الشخصيات تعود لحقيقتها في النهاية. أما أسلوب "الترويض" المُستمد من مهارات ترويض الطيور الجارحة، فهو المحرك الأساسي للمسرحية والذي يثبت القسوة النفسية لتدجين شخصية المرأة المتمردة.</Ar>

                                {activeTab === 'realism' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <div className="text-center mb-10">
                                            <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 mb-3">Critical Analysis</h2>
                                            <p className="text-slate-500 text-lg">Implicature, Convention, and interpretation.</p>
                                        </div>

                                        <Section title="Cognitive & Conversational Analysis" subtitle="Marilyn M. Cooper's Essay" icon={AlertCircle} color="amber">
                                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 overflow-visible space-y-5 text-sm text-slate-700">
                                                <p><strong>The Central Problem:</strong> Is Kate sincere in her final speech declaring her husband as her "lord and sovereign"? Marilyn M. Cooper argues that disagreement over this arises because audiences combine conversational inference with varying social, literary, and cultural conventions.</p>
                                                
                                                <p><strong>Two Major Interpretations:</strong><br/>
                                                1. <em>Robert Heilman:</em> Sees Petruchio as energetic and affectionate. The taming brings out Kate's better qualities, moving from conflict toward harmony.<br/>
                                                2. <em>Coppélia Kahn:</em> Sees Petruchio as an agent of male dominance. Kate's final speech is deeply ironic and part of a social contest, not true surrender.</p>

                                                <p><strong>Grice & Conversational Implicature:</strong><br/>
                                                Cooper uses Paul Grice's Cooperative Principle (Quantity, Quality, Relation, Manner). When speakers violate these maxims, hearers infer extra meaning (implicature). When Petruchio showers Kate with exaggerated compliments, he violates the maxim of quality (saying what is false). This could imply deliberate flattery, manipulation, or genuine affection beneath a comic performance.</p>

                                                <p><strong>The Power of Conventions:</strong><br/>
                                                In courtship scenes or farce, standard violations of maxims lose their literal force because ritual exaggeration is expected. Genre shapes interpretation at every step. If read as a farce, it is comic verbal play. If read psychologically, it is evidence of coercion and domination.</p>

                                                <p><strong>Conclusion:</strong><br/>
                                                In <em>The Taming of the Shrew</em>, meaning emerges not from dialogue alone but from the interaction between what characters imply and what audiences assume about language, genre, culture, and power.</p>
                                            </div>
                                            <Ar title="التحليل اللغوي والمعرفي (مقال مارلين م. كوبر)">
                                                تطرح الباحثة مارلين كوبر المشكلة الرئيسية في المسرحية: هل كاثرينا صادقة في خطابها النهائي حين تذل نفسها أمام زوجها؟ هنالك تفسيران متناقضان للباحثين: البعض يعتبر الترويض طريقاً لإخراج أفضل ما في الفتاة وبناء حياة سعيدة وهادئة، والبعض يراه قهراً ذكورياً وإخضاعاً دكتاتورياً يضطر كاثرينا للسخرية المبطنة والتلاعب لكي تتجنب الإيذاء. وتؤكد كوبر أن استخدامنا للقواعد اللغوية العميقة (مثل خرق قواعد الحديث لتوصيل معاني خفية كالسخرية أو التملق) وتقييمنا لنوع المسرحية (هل هي مجرد كوميديا سخيفة فارغة، أم دراما نفسية) هو ما يحدد تماماً كيفية فهمنا لهذا الخضوع المهين والنوايا الحقيقية وراء كلام الزوجين.
                                            </Ar>

                        {activePlay === 'theFather' && (
                            <div className="space-y-10">
                                
                                {/* TAB 1: FOUNDATION & PLOT */}
                                {activeTab === 'foundation' && (
                                    <div className="space-y-10 animate-in fade-in duration-300">
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row gap-6 items-center hover:border-slate-200 transition-colors">
                                            <div className="md:w-1/4 flex justify-center">
                                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center border-4 border-white shadow-md text-slate-400">
                                                    <BookOpen size={40} />
                                                </div>
                                            </div>
                                            <div className="md:w-3/4 text-center md:text-left space-y-2">
                                                <h2 className="text-2xl font-black text-slate-800">August Strindberg</h2>
                                                <p className="text-slate-600 text-sm leading-relaxed">
                                                    Published and performed in 1887, <em>The Father</em> is a tragic drama in three acts. Exploring a Darwinian struggle of wills, the play highlights Strindberg's transition between naturalistic fiction and expressionism as it depicts a brutal psychological battle between a scientist and his wife over their daughter.
                                                </p>
                                                <Ar>مسرحية "الأب" لستريندبرغ: دراما تراجيدية تعكس نظرية داروين التطورية في صراع البقاء بين الأقوى والأضعف داخل الأسرة. تجسد المسرحية المعركة النفسية الوحشية والشرسة بين زوج عالم وزوجته الماكرة للسيطرة والاستحواذ الكامل على مصير ابنتهما، لتنتهي بانهيار تام وتدمير نفسي للزوج.</Ar>
                                            </div>
                                        </div>

                                        <Section title="Plot Summary" subtitle="Act by Act Breakdown" icon={Map} color="slate">
                                            <div className="bg-white rounded-2xl border border-slate-100 p-6 md:p-10 shadow-sm">
                                                <PlotStep act="I" title="The Dispute" color="slate" description={
                                                    <>
                                                        <p>The play opens in the Captain's home, establishing him as a proud military man and scientist. A central conflict quickly erupts between him and his wife, Laura, over their daughter Bertha's education. The Captain wants her to leave home to be educated in the city, while Laura insists she stay.</p>
                                                        <p>Laura begins planting subtle doubts in the Captain's mind regarding whether he is truly Bertha's biological father. Her manipulation shakes his confidence and sets the stage for psychological ruin.</p>
                                                        <Ar>تبدأ المسرحية في منزل الكابتن، وهو ضابط عسكري فخور وعالم مُحترم. سرعان ما يشتعل نزاع حاد بينه وبين زوجته "لورا" حول كيفية تربية وتعليم ابنتهما "برثا". يرى الأب بحكم سلطته الذكورية أن من الأفضل إرسال ابنته للمدينة لتتلقى تعليماً علمانياً بعيداً عن الخرافات، بينما ترفض لورا ذلك بعناد شديد رغبةً في إبقائها تحت سيطرتها. للانتصار في هذه المعركة، تلجأ لورا إلى خطة شيطانية وماكرة؛ حيث تبدأ في التلميح وزرع شكوك قاتلة في رأس زوجها حول ما إذا كان هو الأب البيولوجي الحقيقي لـ "برثا"، وهو ما يزلزل كيانه ويهدد استقراره النفسي.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="II" title="The Psychological Warfare" color="slate" description={
                                                    <>
                                                        <p>Laura intensifies her campaign to undermine the Captain's authority. She intercepts his letters, isolating him and disrupting his scientific work, making him increasingly paranoid that the women in his house are conspiring against him.</p>
                                                        <p>When the village Doctor is introduced, Laura cleverly manipulates him into believing the Captain is mentally unstable. In a desperate confrontation, Laura uses her cunning to outmaneuver the Captain, pushing him closer to a mental breakdown by outright weaponizing the question of Bertha's paternity.</p>
                                                        <Ar>تُصعّد لورا من حربها النفسية لتدمير سلطة الكابتن كلياً. تقوم بفرض حصار عليه داخل منزله؛ تعترض رسائله البريدية وتخفيها لتدمير أبحاثه ومكانته العلمية، وتجعله يشعر بأن كل النساء في المنزل يتآمرن ضده، مما يدفعه نحو "البارانويا" (جنون الارتياب). وعندما يصل طبيب القرية الجديد، تتلاعب به لورا ببراعة فائقة وتوهمه بأن الكابتن يعاني من اضطرابات عقلية. وفي مواجهة مباشرة ومرعبة بين الزوجين، تستخدم لورا سلاح "الشك في الأبوة" بكل قسوة، وتؤكد له أنه لا يملك دليلاً واحداً على نسب ابنته، مما يدفعه للانهيار وفقدان السيطرة على أعصابه.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="III" title="The Breakdown" color="slate" isLast={true} description={
                                                    <>
                                                        <p>The Captain's mental state severely deteriorates under Laura's psychological manipulation. The entire household now views him as unfit. He makes a final, frantic attempt to assert his authority, but Laura has successfully convinced the Doctor and others that he must be restrained for his own safety.</p>
                                                        <p>In a tragic conclusion, the broken and powerless Captain is physically confined in a straitjacket with the help of his old nurse, Margaret. He loses his autonomy completely, symbolizing Laura's irreversible victory while the family remains in turmoil.</p>
                                                        <Ar>في الفصل الأخير، تتدهور الحالة العقلية للكابتن تماماً تحت وطأة الشكوك والضغط النفسي العنيف. يقوم الكابتن في لحظة يأس وغضب بنوبات عنف، مما يُرسخ قناعة الجميع (بما فيهم الطبيب) بأنه قد جُن بالفعل وأصبح خطراً على من حوله. في نهاية تراجيدية ومؤلمة، يتم إقناع مربيته العجوز الطيبة "مارجريت" التي يثق بها الكابتن كأمه، بأن تُلبسه "سترة المجانين" بحجة تهدئته. يستسلم الكابتن المكسور والمُحطم للمربية، ليجد نفسه مقيداً ومسجوناً في بيته، فاقداً لإرادته وسلطته وابنته وعقله، لتنتصر لورا في صراع البقاء بشكل ساحق ولا رجعة فيه.</Ar>
                                                    </>
                                                } />
                                            </div>
                                        </Section>
                                    </div>
                                )}

                                            <h2 className="text-3xl font-black mb-4 flex items-center gap-3">
                                                <Users className="text-slate-400"/> Dramatis Personae
                                            </h2>
                                            <p className="text-slate-300 text-lg leading-relaxed mb-6">
                                                Strindberg crafts a claustrophobic household where characters are pitted against one another in an inescapable struggle for power and dominance.
                                            </p>
                                            <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                                <h4 className="font-bold text-slate-300 mb-2 uppercase tracking-widest text-xs">Minor Characters Checklist</h4>
                                                <p className="text-sm text-slate-300 leading-relaxed">

                                        <div className="grid grid-cols-1 gap-6 overflow-visible">
                                            <CharacterCard name="The Captain (Adolf)" role="The Fallen Patriarch" icon={ShieldAlert} color="slate" details={
                                                <>
                                                    <p><strong>Background:</strong> A proud military man, cavalry commander, and man of science. He serves as the patriarchal head of the household.</p>
                                                    <p><strong>The Struggle:</strong> He battles his household, which is dominated by women, and his own internal psychological crisis. His descent into paranoia and madness is driven by an existential dread about his authority, identity, and his place as a father.</p>
                                                    <Ar>الكابتن (أدولف): ضابط وباحث علمي. يمثل العقل والسلطة الذكورية. يعاني من أزمة هوية وجودية وصراع نفسي مدمر عندما يتم تشكيكه في حقيقة دوره كـ"أب". تتغلب عليه المؤامرات النسائية التي تحيط به ليدخل في حالة بارانويا (جنون ارتياب) تقضي على مكانته.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Laura" role="The Master Manipulator" icon={BrainCircuit} color="slate" details={
                                                <>

                                                    <Ar>لورا: الزوجة الخبيثة والمُتلاعبة النفسية. تكره سيطرة زوجها وتسعى لتحطيمها بكافة الطرق غير الأخلاقية. تتميز بالبرود والذكاء الخبيث؛ فهي تستخدم الشائعات والتشكيك والمكائد لعزله اجتماعياً وعقلياً للاستئثار التام بمستقبل ابنتهما.</Ar>

                                                <p>The play heavily emphasizes the psychological struggles of the Captain, focusing closely on his descent into paranoia and madness.</p>

                                                    <p className="text-sm text-slate-800">Brought by the Doctor and applied by his trusted nurse, the straitjacket represents the final, ultimate indignity. It physically manifests the Captain's loss of autonomy and serves as a brutal symbol of Laura's complete psychological and physical victory over him.</p>

                                                <p><strong>The Evolution of Drama:</strong><br/>
                                                <em>The Father</em> demonstrates Strindberg's transition between naturalistic fiction and the beginnings of Expressionist drama. It focuses intensely on raw, exaggerated feelings, delving into extreme emotional states like the Captain's frantic despair and Laura's cold, calculated manipulation.</p>
                                                
                                                <p><strong>The Struggle of Wills:</strong><br/>
                                                Strindberg had come to believe that life is essentially a Darwinian series of struggles between weaker and stronger wills. This play manifests that philosophy through a relentless, oppressive power struggle within a marriage.</p>

                                                <p><strong>Power Imbalances:</strong><br/>

                        {/* =========================================

                        {activePlay === 'theory' && (
                            <div className="space-y-12 animate-in fade-in duration-300">
                                {/* Section Header */}
                                <div className="bg-gradient-to-br from-slate-800 to-slate-950 rounded-[2.5rem] p-8 md:p-12 text-white shadow-xl relative overflow-hidden mb-12">
                                    <div className="absolute -right-16 -top-16 text-slate-700 opacity-20 rotate-12 pointer-events-none">
                                        <BrainCircuit size={280} />
