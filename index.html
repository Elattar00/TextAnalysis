                                                    <li><strong className="text-slate-800 block">Social Realism:</strong> Addresses societal constraints, consequences of deceit, and the clash between individual desires and late 19th-century norms.</li>
                                                    <li><strong className="text-slate-800 block">Everyday Language:</strong> Naturalistic dialogue with interruptions, hesitations, and <Vocab word="colloquialisms" simple="casual/slang words" /> adds authenticity.</li>
                                                    <li><strong className="text-slate-800 block">Domestic Settings:</strong> Uses familiar spaces (Werle household, Ekdal apartment) as <Vocab word="microcosms" simple="miniature versions" /> for larger conflicts.</li>
                                                    <li><strong className="text-slate-800 block">Moral Ambiguity:</strong> Characters are not simply good or evil. They grapple with conflicting desires, reflecting true human nature.</li>
                                                </ul>
                                                <Ar>من سمات الواقعية الحديثة هنا: الغوص في أعماق الصراع النفسي الداخلي للشخصيات بدلاً من الأكشن الخارجي، استخدام إعدادات منزلية بسيطة كمسرح للتعبير عن صراعات مجتمعية كبرى، حوارات طبيعية يتخللها التردد والتأتأة، والأهم من ذلك التخلي عن ثنائية الخير والشر، فشخصيات إبسن واقعية تعاني من تناقضات ولا يوجد فيها بطل مثالي أو شرير مطلق.</Ar>
                                                
                                                <div className="grid md:grid-cols-2 gap-4 mt-6 pt-6 border-t border-slate-100 overflow-visible">
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><BrainCircuit size={16}/> Hialmar's Psyche</h5>
                                                        <p className="text-xs text-slate-600">Has no actual gift, but fully believes his own lie that a "great invention" will restore the family name. He lives comfortably in deceit.</p>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><BrainCircuit size={16}/> Gregers' "Sick Conscience"</h5>
                                                        <p className="text-xs text-slate-600">Burdened by his father framing Ekdal (Werle evades guilt, saying <em>"an acquitter is a quitter"</em>). Further tortured by his father corrupting Gina, resulting in Hedvig's hereditary blindness.</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <Section title="Social Critique" subtitle="Ibsen's Target" icon={AlertCircle} color="slate">
                                            <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 overflow-visible">
                                                <ul className="space-y-4 text-sm text-slate-700 overflow-visible">
                                                    <li><strong><span className="text-emerald-700">Hypocrisy & Deception:</span></strong> Society lives in a web of lies. False images are preferred over the destructive truth.</li>
                                                    <li><strong><span className="text-emerald-700">Expectations & Conformity:</span></strong> Characters are trapped in <Vocab word="stifling" simple="suffocating/restrictive" /> roles, suppressing true desires.</li>
                                                    <li><strong><span className="text-emerald-700">Class Hierarchies:</span></strong> Critiques inherent inequalities (Upper Class Werles vs. Lower Class Ekdals).</li>
                                                    <li><strong><span className="text-emerald-700">Gender Roles:</span></strong> Challenges traditional expectations and limited opportunities for women (evident through Gina).</li>
                                                    <li className="overflow-visible"><strong><span className="text-emerald-700">The Illusion of Idealism:</span></strong> Blindly pursuing unrealistic ideals (like Gregers) has destructive consequences.</li>
                                                </ul>
                                            </div>
                                            <Ar>النقد الاجتماعي لدى إبسن يطال النفاق البرجوازي وتفضيل المجتمع للصور الزائفة على الحقيقة القاسية. يبرز إبسن انعدام المساواة الطبقية (بين عائلة ويرلي الثرية وإكدال الفقيرة)، ويتحدى دور المرأة المهضوم (المتمثل في كفاح جينا)، ويختم بنقد قاسي لأولئك الذين يسعون وراء "المثاليات المطلقة" بطريقة متطرفة ومريضة تدمر من حولهم بدلاً من إنقاذهم.</Ar>
                                        </Section>
                                    </div>
                                )}

                                {/* TAB 6: QUOTATIONS */}
                                {activeTab === 'quotations' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <div className="text-center mb-6">
                                            <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 mb-2">Quotations</h2>
                                        </div>

                                        <QuoteCard borderSide="border-amber-500" themeColor="emerald" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>Oh, indeed! Hialmar Ekdal is sick too, is he!</p>
                                                <p><span className="text-amber-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">RELLING:</span>Most people are, worse luck.</p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>And what remedy are you applying in Hialmar's case?</p>
                                                <p><span className="text-amber-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">RELLING:</span>My usual one. I am cultivating the life-illusion* in him. <span className="text-xs font-sans italic opacity-60">("Livslognen," literally "the life-lie.")</span></p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>Life-illusion? I didn't catch what you said.</p>
                                                <p><span className="text-amber-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">RELLING:</span>Yes, I said illusion. For illusion, you know, is the stimulating principle.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play The Wild Duck by Henrik Ibsen. Dr. Relling is talking to Gregers Werle in Act V inside the photography studio. This happens right after Gina's secret past is revealed, leaving Hialmar emotionally shattered. Relling enters to check on Hialmar and argues with Gregers about how to handle this tragedy.</p>
                                                <p>Relling completely rejects Gregers' demand for absolute truth. Instead, he treats Hialmar's distress as a mental illness that needs a 'life-illusion' (Livslognen) to heal. He argues this comfortable lie is a vital medicine that helps fragile people survive. Through Relling, Ibsen shows that blind idealism without empathy is a destructive sickness that ruins families.</p>
                                                <Ar>يناقش الطبيب ريلينج هنا نظرية "وهم الحياة" مع جريجرز. ريلينج يرفض المثالية المدمرة التي ينشرها جريجرز ويعتبر أفعاله تخريباً، مؤكداً أن الإنسان البسيط (مثل هيلمار) مريض نفسياً ويحتاج للعيش في كذبة مطمئنة (أو وهم مصطنع) لكي يتحمل قسوة الواقع ويستمر في الحياة، فهذه الأوهام هي مسكناته العلاجية.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-emerald-500" themeColor="emerald" dialogue={
                                            <>
                                                <p><span className="text-slate-600 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">EKDAL:</span>It's Hakon Werle we have to thank for her, all the same, Gina. [To GREGERS] He was shooting from a boat, you see, and he brought her down. But your father's sight is not very good now. H'm; she was only wounded.</p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>Ah! She got a couple of slugs in her body, I suppose.</p>
                                                <p><span className="text-sky-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">HIALMAR:</span>Yes, two or three.</p>
                                                <p><span className="text-purple-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">HEDVIG:</span>She was hit under the wing, so that she couldn't fly.</p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>And I suppose she dived to the bottom, eh?</p>
                                                <p><span className="text-slate-600 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">EKDAL:</span>Of course. Always do that, wild ducks do. They shoot to the bottom as deep as they can get, sir — and bite themselves fast in the tangle and seaweed — and all the devil's own mess that grows down there. And they never come up again.</p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>But your wild duck came up again, Lieutenant Old Ekdal.</p>
                                                <p><span className="text-slate-600 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">EKDAL:</span>He had such an amazingly clever dog, your father had. And that dog — he dived in after the duck and fetched her up again.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play The Wild Duck by Henrik Ibsen. Old Ekdal, Hialmar, and Hedvig are talking to Gregers Werle in Act II inside the studio. The family is happily showing Gregers their captive wild duck. Old Ekdal explains how Håkon Werle shot the bird, causing it to dive deep into the marsh and hide in the seaweed.</p>
                                                <p>The wild duck is the play's central symbol (or 'quilting point'). Each character projects their own life onto it. Old Ekdal is like the duck, hiding in the garret to escape his public disgrace. Hialmar is trapped in the 'poisonous marsh' of his marriage's lies. Gregers sees himself as the clever dog diving down to save them. Hedvig also mirrors the bird because she is isolated and adopted, foreshadowing her tragic death.</p>
                                                <Ar>يشرح الجد إكدال قصة البطة البرية وكيف أصابها والد جريجرز واختبأت في القاع، ثم أنقذها كلبه. هذه القصة هي تلخيص مجازي للمسرحية؛ عائلة إكدال الجريحة غارقة في مستنقع الأكاذيب والعزلة هرباً من الواقع، ويرى جريجرز في نفسه كلب الصيد المنقذ الذي يسحبهم لبر الأمان بكشف الحقيقة، لكنه يغفل أن إنقاذه المزعوم هو ما سيدمرهم.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-rose-500" themeColor="emerald" dialogue={
                                            <>
                                                <p><span className="text-rose-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GINA:</span>[dusting the backs of the chairs] A nice job you'll have to find such another big garret for the rabbits.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play The Wild Duck by Henrik Ibsen. Gina Ekdal is speaking to Hialmar in Act V inside the studio. Hialmar has just made a highly theatrical return, loudly claiming he will leave the house because he cannot live with 'traitors.' Gina calmly ignores his dramatic tantrums and focuses on her routine cleaning.</p>
                                                <p>Gina's simple act of dusting comically exposes Hialmar's 'romantic hero' act as a childish pose. While Hialmar daydreams about a grand mission, his survival actually depends entirely on Gina's hard work and household management. This contrast proves Hialmar has no real intention of leaving. He relies completely on this domestic comfort to pretend he is a successful leader.</p>
                                                <Ar>بينما يصرخ هيلمار ويقوم بحركات مسرحية درامية مهدداً بترك المنزل بعد اكتشاف ماضي زوجته، تستمر جينا بهدوء شديد في تنظيف الكراسي ونفض الغبار. هذا يظهر الفرق الشاسع بين غضب هيلمار الطفولي الوهمي، وواقعية جينا. هيلمار يظن نفسه بطلاً، ولكنه في الحقيقة عاجز عن تدبير أبسط أمور حياته بدون زوجته التي تقوم بكل العمل.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-purple-500" themeColor="emerald" dialogue={
                                            <>
                                                <p><span className="text-purple-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">HEDVIG:</span>And there's an old bureau with drawers and flaps, and a big clock with figures that go out and in. But the clock isn't going now.</p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>So time has come to a standstill in there — in the wild duck's domain.</p>
                                                <p><span className="text-purple-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">HEDVIG:</span>Yes. And then there's an old paint-box and things of that sort; and all the books.</p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>And you read the books, I suppose?</p>
                                                <p><span className="text-purple-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">HEDVIG:</span>Oh, yes, when I get the chance. Most of them are English though, and I don't understand English. But then I look at the pictures. — There is one great big book called Harrison's History of London. It must be a hundred years old; and there are such heaps of pictures in it. At the beginning there is Death with an hour-glass and a woman. I think that is horrid. But then there are all the other pictures of churches, and castles, and streets, and great ships sailing on the sea.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play The Wild Duck by Henrik Ibsen. Hedvig Ekdal is talking to Gregers Werle in Act III inside the studio. In this quiet moment, Hedvig describes her lonely life and the strange old books she reads in the backroom garret.</p>
                                                <p>The stopped clock shows that normal time has halted in the garret, turning it into a timeless dream-space where the family escapes reality. Because her failing eyesight keeps her out of school, Hedvig relies on these picture books to escape her isolation. The specific image of Death, the hourglass, and the woman acts as dark foreshadowing. It hints at Hedvig's eventual suicide, framed as cosmic revenge for the fathers' past sins.</p>
                                                <Ar>تصف هيدفيج محتويات العلية الغريبة، مشيرة إلى ساعة معطلة وصور في كتاب قديم تُظهر الموت والساعة الرملية. الساعة المعطلة ترمز إلى توقف الزمن في هذا العالم الوهمي الذي هربوا إليه. وصورة "الموت" هي تمهيد رمزي لموت هيدفيج الوشيك؛ فالماضي والزمن المتجمد يلاحقهم كالشبح للانتقام من خطايا آبائهم القديمة.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-rose-500" themeColor="emerald" dialogue={
                                            <>
                                                <p><span className="text-amber-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">RELLING:</span>Oh, life would be quite tolerable, after all, if only we could be rid of the confounded duns that pester us, in our poverty, with the claim of the ideal.</p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>[looking straight before him] In that case, I am glad that my destiny is what is.</p>
                                                <p><span className="text-amber-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">RELLING:</span>May I inquire,—what is your destiny?</p>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>[going] To be the thirteenth at table.</p>
                                                <p><span className="text-amber-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">RELLING:</span>The devil it is.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play The Wild Duck by Henrik Ibsen. Dr. Relling and Gregers Werle are speaking the final lines of Act V in the studio. Hedvig's dead body has just been discovered in the garret, leaving the two men alone to look at the tragic wreckage of the family.</p>
                                                <p>Relling's bitter comment is a final judgment on Gregers' ideals. He points out that ordinary life is tolerable when moral reformers stop forcing painful truths onto vulnerable people. Gregers calling himself the 'thirteenth at table' is a biblical reference to Judas, marking him as a betrayer rather than a savior. His fanatical pursuit of truth without empathy brings only death, completely destroying the idea of a heroic rescuer.</p>
                                                <Ar>الأسطر الأخيرة في المسرحية بعد اكتشاف جثة هيدفيج. يحكم الدكتور ريلينج على مثاليات جريجرز بالفشل التام، مؤكداً أن الحياة ستكون محتملة وجيدة لولا تدخل "المثاليين" المتطرفين لتدمير استقرار البسطاء. إجابة جريجرز بوصف نفسه بـ "الثالث عشر على الطاولة" هي إشارة توراتية لشخصية يهوذا الخائن، ليعترف بأنه جلب الخراب والخيانة بدلاً من الخلاص والمثالية.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-indigo-500" themeColor="emerald" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">GREGERS:</span>(without heeding). And there he is now, with his great, confiding, childlike mind, compassed about with all this treachery living under the same roof with such a creature, and never dreaming that what he calls his home is built upon a lie! (Comes a step nearer.) When I look back upon your past, I seem to see a battle-field with shattered lives on every hand.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play The Wild Duck by Henrik Ibsen. Gregers Werle is talking to his father, Håkon Werle, in Act I. Gregers is confronting his father about the dark secrets surrounding the Ekdal family. He has just realized that Hialmar's comfortable life is completely built on Håkon's past lies and manipulation.</p>
                                                <p>This passage highlights Gregers' dangerous idealism. He firmly believes that deception has ruined the Ekdals, so he feels a moral duty to tell Hialmar the truth, ignoring the pain it will cause. This sets up the play's main conflict: Gregers thinks absolute truth is required for happiness, while Dr. Relling believes that protective illusions are what actually keep people alive.</p>
                                                <Ar>يواجه جريجرز والده الثري بخطاياه في الفصل الأول. يرى جريجرز ماضي أبيه كساحة معركة دمرت حياة الآخرين، ويعبر عن صدمته بأساس الأكاذيب الذي بنيت عليه عائلة هيلمار. هذا النص يمهد لدوافع جريجرز الخطيرة؛ فهو يشعر بالمسؤولية الأخلاقية لتدمير هذه الأكاذيب إيماناً منه بأن الحقيقة وحدها تصنع السعادة، متجاهلاً العواقب الكارثية القادمة.</Ar>
                                            </>
                                        } />
                                    </div>
                                )}
                            </div>
                        )}

                        {/* =========================================
                            PLAY VIEW 2: OTHELLO (EXACT NOTES)
                            ========================================= */}
                        {activePlay === 'othello' && (
                            <div className="space-y-10">
                                
                                {/* TAB 1: FOUNDATION & PLOT */}
                                {activeTab === 'foundation' && (
                                    <div className="space-y-10 animate-in fade-in duration-300">
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row gap-6 items-center hover:border-indigo-200 transition-colors">
                                            <div className="md:w-1/4 flex justify-center">
                                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center border-4 border-white shadow-md text-slate-400">
                                                    <BookOpen size={40} />
                                                </div>
                                            </div>
                                            <div className="md:w-3/4 text-center md:text-left space-y-2">
                                                <h2 className="text-2xl font-black text-slate-800">William Shakespeare</h2>
                                                <p className="text-slate-600 text-sm leading-relaxed">
                                                    English playwright, poet, and actor, widely regarded as the greatest writer in the English language. <em>Othello</em> is a profound tragedy in five acts, driven by jealousy, manipulation, and racial isolation.
                                                </p>
                                                <Ar>ويليام شكسبير: أعظم كُتّاب المسرح والأدب الإنجليزي. "عطيل" هي واحدة من أهم مسرحياته التراجيدية، وتدور أحداثها حول مواضيع الغيرة القاتلة، التلاعب النفسي، الخداع الذي يغطي الحقيقة، ومأساة البطل المنعزل عرقياً ونفسياً عن مجتمعه.</Ar>
                                            </div>
                                        </div>

                                        <Section title="Plot Summary" subtitle="Act by Act Breakdown" icon={Map} color="indigo">
                                            <div className="bg-white rounded-2xl border border-slate-100 p-6 md:p-10 shadow-sm">
                                                <PlotStep act="I" title="Venice & The Secret Marriage" color="indigo" description={
                                                    <>
                                                        <p>The play opens on a street in Venice with an argument between Roderigo and Iago. Roderigo is upset because Desdemona, whom he loves, has married <strong>Othello</strong>. Iago hates Othello for promoting the inexperienced Michael Cassio to lieutenant instead of him.</p>
                                                        <p>Iago and Roderigo wake Brabantio (Desdemona's father) to tell him his daughter was "stolen" by Othello the Moor. Brabantio accuses Othello of using witchcraft.</p>
                                                        <p>Before the Duke of Venice, Othello calmly explains he won Desdemona through his stories of adventure and war. Desdemona confirms her love and loyalty to her husband. The Duke sends Othello to Cyprus to defend against a Turkish invasion, and Desdemona accompanies him.</p>
                                                        <Ar>تبدأ المسرحية في البندقية بغضب الشاب "رودريجو" لأن حبيبته "ديدمونة" هربت لتتزوج سراً من الجنرال الأسمر "عطيل". يستغل "إياجو" (حامل لواء عطيل) هذا الغضب لتنفيذ انتقامه الخاص، فهو يكره عطيل بشدة لأنه لم يرقّه واختار "كاسيو" بدلاً منه. يقوم إياجو ورودريجو بإثارة غضب والد ديدمونة الذي يتهم عطيل باستخدام السحر الأسود لخطف ابنته. لكن أمام مجلس الدوق، يدافع عطيل عن نفسه بلباقة، وتؤكد ديدمونة أن حبها له نابع من إعجابها بشجاعته وبطولاته. يقتنع الدوق ويرسل عطيل لقيادة الجيش في قبرص، وترافقه ديدمونة.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="II" title="Cyprus & The Drunken Brawl" color="indigo" description={
                                                    <>
                                                        <p>In Cyprus, a storm destroys the Turkish fleet. Othello announces a night of celebration for the victory and his marriage. Iago begins his plot by telling Roderigo that Desdemona will soon tire of Othello and look to Cassio.</p>
                                                        <p>Iago purposely gets Cassio drunk during the revels. He then sends Roderigo to provoke him. Cassio starts a fight and ends up stabbing Montano, the governor of Cyprus.</p>
                                                        <p>Othello arrives, stops the commotion, and strips Cassio of his rank. A devastated Cassio is advised by Iago to ask Desdemona to help him get his position back.</p>
                                                        <Ar>بمجرد وصولهم إلى قبرص، تدمر عاصفة قوية أسطول الأعداء الأتراك، فيعلن عطيل بدء الاحتفالات بالنصر وبالزواج. هنا يبدأ إياجو في نسج خيوط مؤامرته؛ حيث يخدع الملازم "كاسيو" ويشجعه على الإفراط في شرب الخمر (وهي نقطة ضعف كاسيو)، ثم يرسل رودريجو لاستفزازه. يندلع شجار عنيف يتدخل فيه حاكم قبرص ويُصاب. يغضب عطيل ويجرد كاسيو من رتبته العسكرية. يتدخل إياجو كـ "صديق ناصح" ويقترح على كاسيو المنهار أن يطلب من ديدمونة التوسط له عند عطيل ليعيده لمنصبه، وهذه هي الخطوة الأولى في فخ تدمير الجميع.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="III" title="The Seed of Jealousy & The Handkerchief" color="indigo" description={
                                                    <>
                                                        <p>Desdemona promises Cassio she will help him. When Othello and Iago approach, Cassio leaves quickly out of shame. Iago uses this moment to plant the seed of doubt: <em>"I cannot think it, that he would steal away so guilty-like."</em></p>
                                                        <p>Iago continuously suggests that Desdemona and Cassio are having an affair. Desdemona's innocent pleading for Cassio only makes Othello more suspicious.</p>
                                                        <p>Later, Othello complains of a headache. Desdemona offers her handkerchief to soothe him, but it drops. Emilia picks it up and gives it to Iago. Iago leaves it in Cassio's room as "ocular proof" of the affair.</p>
                                                        <Ar>تدافع ديدمونة بصدق وحسن نية عن كاسيو أمام زوجها عطيل. يستغل إياجو هذه الشفاعة ليزرع بذور الشك المسمومة في عقل عطيل، ملمحاً بذكاء خبيث إلى وجود علاقة غرامية خفية بين ديدمونة وكاسيو. وفي لحظة فاصلة، تسقط ديدمونة منديلاً ثميناً كان أول هدية من عطيل لها؛ تلتقطه "إميليا" (زوجة إياجو) وتعطيه لزوجها دون أن تعرف نواياه. يأخذ إياجو المنديل ويزرعه خلسة في غرفة كاسيو ليستخدمه لاحقاً كـ "دليل مادي قاطع" على الخيانة المزعومة.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="IV" title="The Trance & The Setup" color="indigo" description={
                                                    <>
                                                        <p>Through Iago's extreme <Vocab word="machinations" simple="schemes/plots" />, Othello falls into an epileptic trance from jealousy. When he wakes, Iago tells him to hide and listen as he talks to Cassio about the affair.</p>
                                                        <p>Iago asks Cassio about his mistress, Bianca (a prostitute). Othello, out of earshot, believes they are laughing about Desdemona. Bianca enters with the handkerchief, proving to Othello that Cassio has it.</p>
                                                        <p>Lodovico arrives with letters from Venice ordering Othello home and leaving Cassio in charge. Othello, fully consumed by rage, strikes Desdemona in public. Iago convinces Roderigo to murder Cassio to keep Desdemona in Cyprus.</p>
                                                        <Ar>يفقد عطيل صوابه تدريجياً وتنهشه نيران الغيرة لدرجة إصابته بنوبة صرع. لزيادة تأكيد الكذبة، يرتب إياجو موقفاً خبيثاً؛ يجعل عطيل يختبئ ويراقب محادثة بين إياجو وكاسيو حول "بيانكا" (عشيقة كاسيو)، لكنه يوهم عطيل أنهم يتحدثون عن ديدمونة. تبلغ الغيرة ذروتها عندما تدخل بيانكا وهي تحمل المنديل الثمين غاضبة. يقتنع عطيل تماماً بخيانة زوجته، وأمام مبعوثي البندقية، يفقد أعصابه ويصفع ديدمونة بوحشية. في هذه الأثناء، يقنع إياجو رودريجو بضرورة اغتيال كاسيو.</Ar>
                                                    </>
                                                } />

                                                <PlotStep act="V" title="The Murder & The Truth" color="indigo" isLast={true} description={
                                                    <>
                                                        <p>Roderigo ambushes Cassio, but Cassio wounds him. Iago secretly stabs Cassio in the leg and later murders Roderigo to keep him quiet.</p>
                                                        <p>Meanwhile, Othello stands over sleeping Desdemona. Despite her desperate pleas of innocence, he smothers her. Emilia enters, discovers the murder, and raises the alarm.</p>
                                                        <p>Othello defends his action by mentioning the handkerchief. Emilia realizes Iago's evil plot and reveals the truth. A crushed Othello tries to kill Iago. Iago stabs Emilia and flees, but is caught.</p>
                                                        <p>Othello makes a final speech, asking to be remembered as one who <em>"loved not wisely but too well,"</em> and kills himself. Iago is ordered to be executed.</p>
                                                        <Ar>في ظلام الليل، ينجح إياجو في إصابة كاسيو وقتل رودريجو ليتخلص من الأدلة. في نفس الوقت، يتسلل عطيل المليء بالشكوك إلى غرفة نوم ديدمونة ويخنقها بدم بارد رغم توسلاتها وتأكيدها على براءتها. تدخل إميليا وتكتشف الجريمة المروعة، وعندما يبرر عطيل فعلته بـ "المنديل"، تدرك إميليا خطة زوجها الشرير إياجو وتفضحه أمام الجميع. يندم عطيل ندماً قاتلاً بعد اكتشاف براءة زوجته وغفلته، فيطعن إياجو ثم يقتل نفسه ليموت بجوار ديدمونة. في النهاية يتم القبض على إياجو ليواجه عقاباً قاسياً.</Ar>
                                                    </>
                                                } />
                                            </div>
                                        </Section>
                                    </div>
                                )}

                                {/* TAB 2: CHARACTERS */}
                                {activeTab === 'characters' && (
                                    <div className="space-y-6 animate-in fade-in duration-300 overflow-visible">
                                        <div className="bg-slate-800 text-white p-8 rounded-3xl mb-8 shadow-lg">
                                            <h2 className="text-3xl font-black mb-4 flex items-center gap-3">
                                                <Users className="text-indigo-400"/> Dramatis Personae
                                            </h2>
                                            <p className="text-slate-300 text-lg leading-relaxed mb-6">
                                                Shakespeare's characters are driven by extreme, destructive passions—jealousy, pure malice, blind loyalty, and absolute devotion.
                                            </p>
                                            <div className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                                <h4 className="font-bold text-indigo-300 mb-2 uppercase tracking-widest text-xs">Minor Characters Checklist</h4>
                                                <p className="text-sm text-slate-300">
                                                    <strong className="text-white">Bianca:</strong> (Cassio's mistress) • <strong className="text-white">Brabantio:</strong> (Desdemona's father) • <strong className="text-white">Duke of Venice:</strong> (Official authority) • <strong className="text-white">Montano:</strong> (Governor of Cyprus) • <strong className="text-white">Lodovico & Gratiano:</strong> (Venetian messengers) • <strong className="text-white">Clown:</strong> (Othello's servant)
                                                </p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-6 overflow-visible">
                                            <CharacterCard name="Othello" role="The Tragic Hero & The Outsider" icon={ShieldAlert} color="indigo" details={
                                                <>
                                                    <p><strong>Background:</strong> A Christian Moor and highly respected general in Venice. He marries Desdemona secretly.</p>
                                                    <p><strong>The Outsider:</strong> We hear about him before we see him. Iago paints him as a boastful, sensual beast. But when we meet him, he is noble and calm. His color is a visual symbol of his status as the "outsider." He is a soldier in a commercial city; Venice needs his skills, but he is never truly one of them.</p>
                                                    <p><strong>The Tragedy:</strong> He judges men by his own high motives. When corrupted by Iago's lies and his own deep-seated insecurities about his age and race, he transforms from a rational commander into a jealous beast, ultimately destroying the love that was the center of his world.</p>
                                                    <Ar>عطيل (Othello): البطل التراجيدي الغريب. جنرال أسود البشرة يحظى باحترام عسكري كبير لكنه منبوذ اجتماعياً وعرقياً. يمتلك قلباً نبيلاً لكنه ساذج ويثق بمن حوله بسهولة. يستخدم إياجو شعور عطيل بالنقص كـ "غريب" ليزرع فيه الغيرة القاتلة، ليتحول من بطل رزين وعاشق مخلص إلى وحش مهووس يقتل زوجته بيده.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Iago" role="The Machiavellian Villain" icon={Crosshair} color="indigo" details={
                                                <>
                                                    <p><strong>Background:</strong> Othello's <Vocab word="ensign" simple="standard-bearer" />. He hates Othello for giving the lieutenancy to Cassio and suspects Othello slept with his wife.</p>
                                                    <p><strong>The Antithesis:</strong> Iago is the direct opposite of Othello. He is crooked, selfish, and revels in deception. He views humans merely as animals and operates in a world of pure hatred.</p>
                                                    <p><strong>Motiveless Malignity:</strong> While he gives many reasons for his actions, they seem like excuses. He hates the "daily beauty" in others' lives. His motivation remains mysterious; looking into Iago is like looking into the "heart of darkness." He lacks empathy entirely, manipulating reality to destroy four different lives without remorse.</p>
                                                    <Ar>إياجو (Iago): الشرير المكيافيلي المُتلاعب. يمثل أقصى درجات الخبث والشر الذي لا مبرر له سوى الرغبة في التدمير وكراهية رؤية الآخرين سعداء. ببراعة فائقة، يصنع من نفسه صورة الرجل "الصادق والموثوق" ليتلاعب بعقول الجميع، محولاً ثقتهم به إلى سلاح يدمرهم واحداً تلو الآخر بلا ذرة ندم.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Desdemona" role="The Courageous Victim" icon={HeartHandshake} color="indigo" details={
                                                <>
                                                    <p><strong>Background:</strong> Brabantio's daughter. She elopes with Othello, shocking her father who believes it must be "black magic."</p>
                                                    <p><strong>Personality:</strong> She is not just a passive victim. She showed great initiative in courting Othello, asking him to tell his stories. She is a woman of great independence, determination, and courage, defying her father and the Venetian norms to be with the man she loves.</p>
                                                    <p><strong>Significance:</strong> Her love is pure but also physical (insisting on going to Cyprus for conjugal rights). She possesses a shining innocence and touching naivety. She stands for the radiant faith and fortitude of humanity, sharply contrasting with Iago's dark villainy.</p>
                                                    <Ar>ديدمونة (Desdemona): الضحية الشجاعة. امرأة مخلصة، محبة بقوة وعناد، تكسر التقاليد الأرستقراطية لزواجها من عطيل الأسمر. تدفع حياتها ثمناً لبرائتها وسذاجتها الطيبة، حيث استغل إياجو لطفها ودفاعها الإنساني عن كاسيو كأدوات لإقناع عطيل بخيانتها الوهمية.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Emilia" role="The Practical Realist" icon={Home} color="indigo" details={
                                                <>
                                                    <p><strong>Background:</strong> Iago's wife and Desdemona's attendant. She unwittingly aids Iago by giving him the dropped handkerchief.</p>
                                                    <p><strong>Philosophy:</strong> Unlike Desdemona's idealism, Emilia is a worldly realist. She accepts people for what they are and sees marriage as a social contract. She is aware of men's flaws and speaks out fiercely against husbands who mistreat their wives.</p>
                                                    <p><strong>Redemption:</strong> She rescues "common sense" from Iago's corruption. In the end, she proves capable of ultimate loyalty and courage. By exposing her husband's lies, she sacrifices her own life for the truth and her faith in Desdemona.</p>
                                                    <Ar>إميليا (Emilia): الواقعية والشجاعة. زوجة إياجو البراغماتية التي تفهم طبيعة الرجال القاسية جيداً. تُخطئ بسذاجة حينما تسلم المنديل لزوجها، لكنها تكفّر عن خطئها ببطولة نادرة في النهاية عندما تقف في وجه زوجها القاتل لتكشف خطته الدنيئة وتبرئ ديدمونة وتضحي بحياتها لأجل الحقيقة.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Michael Cassio" role="The Sophisticated Deputy" icon={Briefcase} color="indigo" details={
                                                <>
                                                    <p><strong>Background:</strong> Othello's newly appointed lieutenant. A Florentine with elegant manners.</p>
                                                    <p><strong>Personality:</strong> He is a good, responsible soldier (chosen to replace Othello in Cyprus), but has a critical weakness: a "bad head for drinking," which Iago exploits to get him fired.</p>
                                                    <p><strong>Significance:</strong> He is a charming "ladies' man." His civility towards Desdemona makes Iago's lies seem believable to Othello. His liaison with the prostitute Bianca is cleverly used by Iago to provide the fake "ocular proof" of the affair.</p>
                                                    <Ar>مايكل كاسيو (Michael Cassio): الملازم المهذب. جندي وفيّ يمتلك وسامة ولباقة مع النساء مما يجعله فريسة سهلة في مؤامرة إياجو لاتهامه بالخيانة. نقطة ضعفه الكبرى هي عدم تحمله لشرب الخمر، وهو الفخ الذي يوقعه إياجو فيه لتجريده من رتبته وبدء سلسلة الكوارث.</Ar>
                                                </>
                                            } />
                                            <CharacterCard name="Roderigo" role="The Foolish Dupe" icon={Users} color="indigo" details={
                                                <>
                                                    <p><strong>Background:</strong> A rich, jealous suitor who pays Iago to help him win Desdemona.</p>
                                                    <p><strong>Personality:</strong> He is a fool pure and simple. He is entirely manipulated by Iago, doing all his dirty work (starting the fight, attempting to kill Cassio).</p>
                                                    <p><strong>Significance:</strong> Because he is a fool, Iago speaks openly to him, allowing the audience to hear Iago's true, evil motives. Roderigo also provides proof of Desdemona's virtue, as he holds her in high esteem despite trying to seduce her.</p>
                                                    <Ar>رودريجو (Roderigo): العاشق الساذج والأحمق. رجل غني مهووس بحب ديدمونة، يستغله إياجو كمصدر للمال وكأداة لتنفيذ أعماله القذرة (كافتعال الشجار ومحاولة قتل كاسيو). وجوده في المسرحية مهم لأنه الشخصية الوحيدة التي يبوح لها إياجو ببعض نواياه الشريرة الحقيقية ليفهمها الجمهور.</Ar>
                                                </>
                                            } />
                                        </div>
                                    </div>
                                )}

                                {/* TAB 3: THEMES */}
                                {activeTab === 'themes' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <Section title="Appearance vs. Reality" subtitle="The Deceit of 'Honest' Iago" icon={EyeOff} color="amber">
                                            <div className="mb-4">
                                                The theme of "Seeming" revolves entirely around Iago. He is called "honest Iago" by almost everyone, yet he is treacherous and manipulative. Desdemona is the exact opposite: Othello believes she is deceitful, when she is actually completely pure.
                                                <br/><br/><strong>Theme takeaway:</strong> Misrepresentation allows evil to gain trust. Trusting in a false "honesty" becomes the crucial contributor to the characters' downfall. Uncovering reality earlier would have changed the entire tragedy.
                                            </div>
                                            <Ar title="المظهر مقابل الحقيقة والواقع">
                                                يعتمد جوهر التراجيديا هنا على تناقض "المظاهر". يُعرف إياجو وسط الجميع بأنه "إياجو الصادق الأمين"، بينما هو في الحقيقة ثعلب ماكر وشرير. على النقيض تماماً، تظهر ديدمونة في عقل عطيل كزوجة خائنة كاذبة، بينما حقيقتها هي البراءة والوفاء المطلق. فشل البطل في التفريق بين القناع الزائف والحقيقة المخبأة كان سبب دمارهم جميعاً.
                                            </Ar>

                                            <ComparisonTable title="The Distorted Mirror" leftTitle="Appearance (The Lie)" rightTitle="Reality (The Truth)" color="amber" rows={[
                                                {
                                                    left: <div className="space-y-2">
                                                        <strong className="text-amber-700 block">"Honest" Iago</strong>
                                                        <p>Seen as a trustworthy, reliable friend and a loyal soldier to Othello. Everyone seeks his advice.</p>
                                                    </div>,
                                                    right: <div className="space-y-2">
                                                        <strong className="text-red-700 block">The Machiavellian Villain</strong>
                                                        <p>He is completely selfish, tearing down everything others love. He uses manipulation to make people ruin themselves.</p>
                                                    </div>
                                                },
                                                {
                                                    left: <div className="space-y-2">
                                                        <strong className="text-amber-700 block">The "Unfaithful" Wife</strong>
                                                        <p>Othello is convinced Desdemona is a "whore" who gave her handkerchief to Cassio as a love token.</p>
                                                    </div>,
                                                    right: <div className="space-y-2">
                                                        <strong className="text-red-700 block">The Blameless Victim</strong>
                                                        <p>Desdemona is entirely innocent and faithful. The evidence is entirely circumstantial and fabricated by Iago.</p>
                                                    </div>
                                                }
                                            ]} />
                                            <Ar>يوضح الجدول التناقض القاتل: إياجو الصادق ظاهرياً هو الشرير الحقيقي، وديدمونة الخائنة ظاهرياً هي الوفية البريئة.</Ar>
                                        </Section>

                                        <div className="grid md:grid-cols-2 gap-6 overflow-visible">
                                            <TermBox title="Jealousy" icon={BrainCircuit} color="slate" content={
                                                <ul className="space-y-3">
                                                    <li><strong>The Green-Eyed Monster:</strong> Jealousy impedes a person's ability to distinguish reality from appearance.</li>
                                                    <li><strong>Othello's Fall:</strong> Though he is intelligent and honorable, jealousy turns him into a beast. He suffers epileptic fits and loses his ability to speak clearly.</li>
                                                    <li><strong>Other Characters:</strong> Both Iago and Roderigo also act out of jealousy, leading to disastrous consequences.</li>
                                                </ul>
                                            } />
                                            <TermBox title="Machiavellian Determination" icon={Zap} color="slate" content={
                                                <ul className="space-y-3">
                                                    <li><strong>Absolute Secrecy:</strong> No character fully knows Iago's plan until the very end.</li>
                                                    <li><strong>Psychological Manipulation:</strong> He doesn't just lie; he replaces a person's reality with what he wants them to see.</li>
                                                    <li><strong>Lack of Morals:</strong> He ruins four lives without showing a single drop of remorse. He is cunning, witty, and perfectly evil.</li>
                                                </ul>
                                            } />
                                        </div>
                                        <Ar>الغيرة هي "الوحش ذو العيون الخضراء" الذي أعمى البصيرة وأفقد عطيل عقله واتزانه، فتحول من جنرال حكيم إلى وحش دموي. ومن جهة أخرى، يجسد إياجو التصميم المكيافيلي القاسي، حيث يضع خططه في سرية تامة ويتلاعب بعقول ضحاياه دون أي رادع أخلاقي أو ندم، مسبباً دمار أربع حيوات دفعة واحدة.</Ar>
                                    </div>
                                )}

                                {/* TAB 4: MOTIFS & SYMBOLS */}
                                {activeTab === 'symbols' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <Section title="The Handkerchief" subtitle="The Fatal Token" icon={Feather} color="indigo">
                                            <div className="text-lg mb-6">
                                                The handkerchief is the most critical symbol in the play. It means completely different things to different characters, serving as the central pivot for Iago's deception and Othello's tragic rage.
                                            </div>
                                            
                                            <div className="grid md:grid-cols-2 gap-4 overflow-visible">
                                                <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-100 overflow-visible">
                                                    <strong className="text-indigo-900 block mb-2">To Desdemona</strong>
                                                    <p className="text-sm text-indigo-800">It was the first gift she ever received from Othello. She keeps it with her constantly as a pure symbol of his love and their bond.</p>
                                                </div>
                                                <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-100 overflow-visible">
                                                    <strong className="text-indigo-950 block mb-2">To Iago</strong>
                                                    <p className="text-sm text-indigo-800">It is a tool for manipulation. By taking possession of it, he converts an innocent cloth into the fake <strong>"ocular proof"</strong> of infidelity.</p>
                                                </div>
                                                <div className="bg-indigo-50 p-5 rounded-xl border border-indigo-100 md:col-span-2 overflow-visible">
                                                    <strong className="text-indigo-900 block mb-2">To Othello (Fidelity & Virginity)</strong>
                                                    <p className="text-sm text-indigo-800">Othello claims the handkerchief has magical properties—woven by a 200-year-old prophet using silk from sacred worms and dye from mummified virgins' hearts. His mother used it to ensure his father's loyalty. The pattern of <strong>red strawberries on a white background</strong> visually suggests the bloodstains on a virgin's wedding sheets. Therefore, losing the handkerchief signifies the ultimate loss of chastity and marital fidelity.</p>
                                                </div>
                                            </div>
                                            <Ar>المنديل هو أداة الهدم الرمزية الكبرى في المسرحية؛ يحمل معنى مختلفاً لكل شخصية:
- بالنسبة لديدمونة: هو رمز نقي ومقدس للحب، كونه أول هدية من زوجها.
- بالنسبة لإياجو: مجرد أداة تلاعب ماكرة وخبيثة، يستخدمها كـ "دليل بَصَري مزيف" لإقناع عطيل بالخيانة.
- بالنسبة لعطيل: هو إرث سحري يرمز لعفة الزوجة ووفائها. لونه الأبيض المنقط بفراولة حمراء يرمز لقطرات الدماء على أغطية سرير الزفاف (دليل العذرية). لذا، ضياع المنديل ووقوعه في يد كاسيو لم يكن مجرد ضياع لقطعة قماش، بل اعتبره عطيل دليلاً مادياً قاطعاً على ضياع شرف ديدمونة وفقدانها لعفتها.</Ar>
                                        </Section>
                                    </div>
                                )}

                                {/* TAB 5: REALISM & CRITIQUE (Adapted to Thematic Depth) */}
                                {activeTab === 'realism' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <div className="text-center mb-10">
                                            <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 mb-3">Critical Analysis</h2>
                                            <p className="text-slate-500 text-lg">The psychological battleground of Shakespeare's tragedy.</p>
                                            <Ar>التحليل النقدي: ساحة المعركة النفسية في تراجيديا شكسبير وكيف يطغى الشر الماكر على الخير الساذج.</Ar>
                                        </div>

                                        <div className="grid md:grid-cols-1 gap-6 overflow-visible">
                                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-indigo-500 overflow-visible">
                                                <h4 className="font-bold text-xl text-slate-900 mb-4">The Conflict Between Good & Evil</h4>
                                                <ul className="space-y-4 text-sm text-slate-600 overflow-visible">
                                                    <li><strong className="text-slate-800 block">The Embodiment of Good:</strong> Othello is initially presented as a brave, courageous, and honorable soldier. His love represents the pure, good aspect of human nature.</li>
                                                    <li><strong className="text-slate-800 block">The Embodiment of Evil:</strong> Iago is the complete contrast. He is two-faced and manipulative, existing only to prey on the goodness of others.</li>
                                                    <li><strong className="text-slate-800 block">The Crossing of the Line:</strong> Shakespeare uses Iago to take advantage of Othello's trusting personality. Othello demonstrates how a noble character can cross the line from good into evil when overridden with hate and jealousy.</li>
                                                </ul>
                                                <Ar>الصراع الأزلي بين الخير والشر: يمثل عطيل وحبه النبيل لديدمونة الجانب المشرق والخيّر للطبيعة البشرية، بينما يمثل إياجو الشر الخالص والمنافق. عبقرية شكسبير تكمن في توضيح كيف يمكن للشخص النبيل (عطيل) أن يعبر الخط الفاصل نحو الشر المطلق ويصبح مجرماً دموياً عندما يتلاعب أحدهم بنقطة ضعفه ويثير في قلبه الكراهية والغيرة العمياء.</Ar>
                                                
                                                <div className="grid md:grid-cols-2 gap-4 mt-6 pt-6 border-t border-slate-100 overflow-visible">
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><BrainCircuit size={16}/> Love as Salvation</h5>
                                                        <p className="text-xs text-slate-600">Love shows the good in all the characters. It is the center of Othello's world, without which 'chaos has come again'.</p>
                                                    </div>
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <h5 className="font-bold text-slate-800 mb-2 flex items-center gap-2"><AlertCircle size={16}/> Jealousy as Corruption</h5>
                                                        <p className="text-xs text-slate-600">Jealousy displays the evil potential within the characters. The relationship between Othello and Iago is a literal battle of these two universal forces.</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 6: QUOTATIONS */}
                                {activeTab === 'quotations' && (
                                    <div className="space-y-8 animate-in fade-in duration-300 overflow-visible">
                                        <div className="text-center mb-6">
                                            <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 mb-2">Quotations</h2>
                                        </div>

                                        <QuoteCard borderSide="border-indigo-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-indigo-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">OTHELLO:</span>Put out the light, and then put out the light.</p>
                                                <p>If I quench thee, thou flaming minister,</p>
                                                <p>I can again thy former light restore,</p>
                                                <p>Should I repent me; but once put out thy light,</p>
                                                <p>Thou cunning'st pattern of excelling nature,</p>
                                                <p>I know not where is that Promethean heat</p>
                                                <p>That can thy light relume.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Othello is speaking to himself in a soliloquy in Act V, standing over the sleeping Desdemona in her bedchamber. Holding a candle, he prepares to murder his wife, contemplating the permanent finality of extinguishing her life based on Iago's false proofs.</p>
                                                <p>Othello contrasts the physical candle, which can be relit, with the metaphorical light of Desdemona's life, which cannot. However, he completely misses the play's deeper metaphor that understanding is seeing. He relies only on superficial physical vision, seeing her external beauty but lacking the 'Promethean heat' or divine knowledge to recognize her inner innocence. His failure to understand that true knowledge requires more than just physical sight leads directly to his downfall.</p>
                                                <Ar>في الفصل الأخير، يقف عطيل حاملاً شمعة فوق ديدمونة النائمة ليستعد لقتلها. يعقد مقارنة مؤلمة: إذا أطفأ الشمعة يمكنه إعادة إشعالها، ولكن إن أطفأ ضوء حياة ديدمونة فلن توجد قوة سحرية لتعيدها للحياة. يكشف هذا الاقتباس عن اعتماده المدمر على الرؤية البصرية؛ فهو يرى جمالها الخارجي كالشمعة المنيرة، لكن تنقصه "البصيرة القلبية" ليرى نقاء برائتها من الداخل، مما يؤدي لمأساته.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-emerald-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">IAGO:</span>Heaven is my judge, not I for love and duty,</p>
                                                <p>But seeming so, for my peculiar end;</p>
                                                <p>The native act and figure of my heart</p>
                                                <p>In compliment extern, 'tis not long after</p>
                                                <p>But I will wear my heart upon my sleeve</p>
                                                <p>For daws to pick at; I am not what I am.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Iago is talking to Roderigo in Act I on a street in Venice. At the very beginning of the play, Iago confesses his deep hatred for Othello after being passed over for a military promotion, freely revealing his deceptive nature to his foolish companion.</p>
                                                <p>This passage establishes Iago's Machiavellian philosophy and subverts the idea that seeing is understanding. While Othello believes that outward appearances perfectly reflect inner truths, Iago treats appearance and reality as opposites, declaring 'I am not what I am.' By using a clothing metaphor, Iago demonstrates that outward visibility can be easily manipulated to hide true internal intentions, making him the perfect villain.</p>
                                                <Ar>في الفصل الأول، يبوح إياجو לרودريجو بحقيقة شخصيته. يضع إياجو قاعدة الشر والمكر الأساسية في المسرحية بجملة "أنا لست ما أبدو عليه". يوضح أنه يمثل الولاء والخضوع ظاهرياً فقط لتحقيق مآربه الشخصية المدمرة. إياجو يكسر قاعدة أن "المظاهر تعكس البواطن"، فهو يرتدي قناع الأمانة ليخدع الجميع بينما قلبه مليء بالحقد القذر.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-rose-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">IAGO:</span>Do but encave yourself</p>
                                                <p>And mark the fleers, the gibes, and notable scorns</p>
                                                <p>That dwell in every region of his face.</p>
                                                <p>For I will make him tell the tale anew:</p>
                                                <p>Where, how, how oft, how long ago, and when</p>
                                                <p>He hath, and is again to cope your wife.</p>
                                                <p>I say, but mark his gesture.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Iago is talking to Othello in Act IV in Cyprus. Iago has just driven Othello into a jealous trance. He now instructs Othello to hide and watch a staged conversation with Cassio, falsely claiming they will be discussing Desdemona when they are actually discussing Bianca.</p>
                                                <p>This dialogue perfectly illustrates Iago's absolute control over Othello's mind. By acting as a literal stage-manager, Iago controls both what Othello sees and how he interprets it. Because Othello relies entirely on the flawed belief that seeing equals knowing, Iago easily weaponizes this by providing a false context beforehand. Othello's demand for objective 'ocular proof' becomes his fatal weakness.</p>
                                                <Ar>في الفصل الرابع، يلعب إياجو دور المخرج المسرحي العبقري، حيث يطلب من عطيل المنهوس بالغيرة أن يختبئ ليراقب ملامح وحركات كاسيو بينما يتحدث معه. يوهم إياجو عطيل بأن كاسيو يسخر من علاقته بديدمونة (بينما يتحدث في الواقع عن عاهرة). هذا المشهد يؤكد أن الرؤية البصرية البحتة ("أريد دليلاً بَصرياً") يمكن التلاعب بها كلياً إذا تم تشويه السياق المُسبق كما فعل إياجو ببراعة.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-purple-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-indigo-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">OTHELLO:</span>My blood begins my safer guides to rule,</p>
                                                <p>And passion, having my best judgment collied,</p>
                                                <p>Assays to lead the way.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Othello is speaking to Iago and Montano in Act II in Cyprus. This moment happens immediately after Cassio's drunken brawl has disturbed the peace. Othello arrives to stop the chaos and angrily demands to know who started the fight.</p>
                                                <p>Othello admits that his passion and anger are beginning to darken his rational judgment and his ability to see the truth clearly. This moment is highly significant because it hands Iago the exact blueprint for Othello's destruction. Iago realizes that if he can overwhelm Othello with blinding passion, Othello's judgment will fail, forcing him to rely entirely on Iago's false interpretations of reality.</p>
                                                <Ar>بعد مشاجرة كاسيو المخمور، يعترف عطيل غاضباً بأن شغفه ودمه الساخن بدءا يسيطران على حكمته وعقله الرزين ويقودانه نحو الظلام. هذا الاعتراف الخطير هو ما منح إياجو "مفتاح تدمير عطيل"؛ فقد أدرك إياجو أنه إذا استطاع تغذية غيرة وعاطفة عطيل بقوة، فإن عقله سيتعطل تماماً، ليقع فريسة سهلة لخداع وتوجيه إياجو.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-amber-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-indigo-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">OTHELLO:</span>No, when light-winged toys</p>
                                                <p>Of feathered Cupid seel with wanton dullness</p>
                                                <p>My speculative and officed instrument,</p>
                                                <p>That my disports corrupt and taint my business,</p>
                                                <p>Let housewives make a skillet of my helm.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Othello is talking to the Duke of Venice and the Senate in Act I. He is defending his request to bring Desdemona with him to the military campaign in Cyprus, assuring the council that his new marriage will not distract him from his duties.</p>
                                                <p>Othello uses a complex falconry metaphor, claiming that love will not 'seel' or sew shut his eyes to blind his military judgment. He relies heavily on the belief that understanding comes from clear vision, proudly asserting that his mind remains perfectly objective and unaffected by passion. Tragically, this represents his fatal hubris, claiming an absolute objectivity that Iago will soon easily dismantle.</p>
                                                <Ar>يدافع عطيل عن قراره باصطحاب ديدمونة معه للحرب ويؤكد للدوق أن عاطفة الحب لن تُغلق عينيه أو تؤثر على حكمه العسكري والعملي. يعكس هذا الاقتباس كبرياء وثقة عطيل الزائدة في قدرته المطلقة على التفرقة بين عمله وعاطفته. المفارقة التراجيدية هي أن هذا الغرور في "عقلانيته" هو ما سيسهل على إياجو هدمه وتعمية بصيرته تماماً بالغيرة.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-indigo-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-indigo-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">OTHELLO:</span>My parts, my title, and my perfect soul</p>
                                                <p>Shall manifest me rightly.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Othello is speaking to Iago in Act I on the streets of Venice. Iago warns Othello to hide from the angry Brabantio, but Othello refuses to run.</p>
                                                <p>Othello insists that his true, honorable nature is perfectly visible to the world. He believes in an absolute, objective reality where acting rightly guarantees being seen and judged correctly. This shows his deep reliance on the idea that seeing is understanding, a belief Iago will soon use against him.</p>
                                                <Ar>يرفض عطيل الهروب من والد ديدمونة الغاضب ويؤكد بثقة أن تاريخه المجيد و"روحه النقية الخالية من العيوب" كفيلان بإظهار حقيقته النبيلة للناس. يوضح هذا إيمان عطيل الساذج بأن العالم مكان مثالي يمكن للناس فيه أن يقرأوا الشرف من المظهر الخارجي. هذا الإيمان الأعمى بصلاح الناس هو ما سيكسره إياجو بخبث لاحقاً.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-emerald-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">DUKE:</span>You must therefore be content to slubber the gloss of your new fortunes with this more stubborn and boisterous expedition.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. The Duke of Venice is speaking to Othello in Act I. He is officially commissioning Othello to leave his new bride and go defend Cyprus against the Turkish fleet.</p>
                                                <p>The Duke fears this difficult military campaign might 'slubber' or besmear Othello's bright reputation. By comparing goodness and reputation to light ('gloss'), this dialogue reinforces the play's metaphor that goodness is light and evil is darkness. It directly anticipates Iago's later plan to turn Desdemona's bright virtue into 'pitch'.</p>
                                                <Ar>يقوم الدوق بإرسال عطيل للحرب المزعجة، محذراً إياه من أنها قد تُعكر أو "تلطخ" اللمعان والبريق الذي صاحب زفافه السعيد وإنجازاته. استخدام مفردات تخص "التلطيخ واللمعان" يرسخ رمزية المسرحية التي تشبه الخير والشرف بالنور والبريق، بينما يشبه الشر بالظلام والتلطيخ، وهو تماماً ما يهدف إياجو لفعله بتلطيخ سمعة ديدمونة الناصعة بالوحل.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-rose-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">IAGO:</span>As he shall smile, Othello shall go mad;</p>
                                                <p>And his unbookish jealousy must conster</p>
                                                <p>Poor Cassio's smiles, gestures, and light behaviors</p>
                                                <p>Quite in the wrong.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Iago is speaking alone in a soliloquy in Act IV in Cyprus. He is preparing to stage a conversation with Cassio about Bianca while Othello watches secretly from a distance.</p>
                                                <p>Iago explains exactly how he controls what Othello sees and knows. He accurately predicts that Othello's jealousy will cause him to completely misinterpret Cassio's innocent smiles and gestures. This proves that visual evidence is not objective; it can easily be manipulated by a clever stage-manager.</p>
                                                <Ar>في حديث مع النفس، يكشف إياجو عن تفاصيل خطته لتحطيم عقل عطيل. يوضح إياجو أن ابتسامات كاسيو العفوية وحركاته الخفيفة ستترجمها "غيرة عطيل الجاهلة" في دماغه على أنها تأكيد ساخر لخيانة ديدمونة. هذا يعكس قدرة إياجو الفذة على التحكم بكيفية استيعاب عطيل وإدراكه للمواقف البصرية البسيطة وقلب معانيها لتخدم مكيدته.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-purple-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-indigo-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">OTHELLO:</span>I'll see before I doubt; when I doubt, prove;</p>
                                                <p>And on the proof there is no more but this:</p>
                                                <p>Away at once with love or jealousy.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Othello is talking to Iago in Act III in Cyprus. Iago has just begun planting the seeds of doubt about Desdemona's faithfulness, and Othello stubbornly demands real evidence.</p>
                                                <p>Othello proudly boasts that he relies entirely on empirical, visible proof. He firmly believes that understanding comes from seeing, and that once he sees proof, all emotional doubt will vanish. Iago uses this exact mindset against him by providing fake visual proof, which Othello blindly accepts as truth.</p>
                                                <Ar>يطلب عطيل بثقة دليلاً مرئياً قاطعاً على شكوك إياجو، مُدّعياً أنه لا يشك إلا بما يراه عياناً، وأنه بمجرد رؤية الدليل سيتخذ قراره بإنهاء الحب والغيرة معاً بلا رجعة. هذا التعنت والاعتماد الكلي على "الدليل البصري" هو السلاح الذي سيرتد إلى صدره؛ فإياجو يعلم تماماً كيف يُصنّع له دليلاً بصرياً مزيفاً يقوده للتصديق الأعمى وسفك الدماء.</Ar>
                                            </>
                                        } />

                                        <QuoteCard borderSide="border-amber-500" themeColor="indigo" dialogue={
                                            <>
                                                <p><span className="text-emerald-700 font-sans text-xs uppercase tracking-wider font-extrabold mr-2">IAGO:</span>In Venice they do let heaven see the pranks</p>
                                                <p>They dare not show their husbands; their best conscience</p>
                                                <p>Is not to leave't undone, but kept unknown.</p>
                                            </>
                                        } examParagraphs={
                                            <>
                                                <p>This quotation is from the play Othello by William Shakespeare. Iago is speaking to Othello in Act III in Cyprus. He is exploiting Othello's status as an outsider by explaining how native Venetian women secretly behave.</p>
                                                <p>Iago uses the language of vision to feed Othello's fears. He claims that Venetian women are experts at hiding their true actions from their husbands. This completely shatters Othello's belief that visible appearances match reality, making him paranoid that Desdemona is deceiving him.</p>
