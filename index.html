                                            Theoretical Guide
                                        </span>
                                        <h2 className="text-3xl md:text-5xl font-black tracking-tight">The Grammar of Moves & Modern Drama</h2>
                                        <p className="text-slate-300 text-lg max-w-2xl font-medium leading-relaxed">
                                            A foundational framework for analyzing structural plot dynamics, cognitive stage presence, and the evolution of dramatic forms from communion to modern revolt.

                                    <div className="relative z-10 mt-6 pt-4 border-t border-slate-700/50">
                                        <Ar>القسم النظري والقواعد الأساسية لفهم الأدب الدرامي الحديث وتطوره وانتقاله من الطابع الكلاسيكي القديم إلى مسرح التمرد، بالإضافة لفهم كيفية تشابك الحبكات المسرحية مع بعضها البعض (The Grammar of Moves).</Ar>
                                    </div>
                                </div>

                                <div className="space-y-12">
                                    {/* 1. Move Grammar & Cognitive Analysis */}
                                    <div className="bg-white rounded-[2rem] shadow-lg shadow-slate-200/50 p-6 md:p-10 border border-slate-100 relative group">
                                        <div className="flex items-start gap-4 mb-6">
                                            <div className="p-3 bg-emerald-50 text-emerald-700 rounded-2xl shrink-0">
                                                <Layers size={28} />
                                            </div>
                                            <div>
                                                <h3 className="text-2xl font-black text-slate-900">1. Move Grammar & Cognitive Analysis</h3>
                                                <p className="text-slate-500 text-sm font-bold uppercase tracking-wider mt-1">Structural Plots & Stage Perception</p>
                                            </div>
                                        </div>

                                        <div className="space-y-6 text-slate-700 leading-relaxed text-base">
                                            <p>
                                                Plots do not grow smoothly in a straight line from A to Z. Instead, they operate as a dynamic, cyclical chain where a crisis leads to a catalyst, which triggers a transient resolution.
                                            </p>

                                            {/* Structural flow diagram */}
                                            <div className="bg-slate-50 border border-slate-100 rounded-2xl p-6 my-6">
                                                <h4 className="text-xs font-black uppercase tracking-wider text-slate-400 mb-4 text-center">The Move Grammar Cycle</h4>
                                                <div className="flex flex-col md:flex-row items-center justify-center gap-4 md:gap-2">
                                                    <div className="bg-white px-5 py-3 rounded-xl border border-slate-200 text-center font-bold text-slate-800 shadow-sm w-full md:w-auto">
                                                        <span className="text-xs text-rose-500 uppercase tracking-widest block font-black">Step 1</span>
                                                        Problem
                                                    </div>
                                                    <div className="text-slate-400 rotate-90 md:rotate-0">➔</div>
                                                    <div className="bg-white px-5 py-3 rounded-xl border border-slate-200 text-center font-bold text-slate-800 shadow-sm w-full md:w-auto">
                                                        <span className="text-xs text-amber-500 uppercase tracking-widest block font-black">Step 2</span>
                                                        Catalyst (Helping Factor)
                                                    </div>
                                                    <div className="text-slate-400 rotate-90 md:rotate-0">➔</div>
                                                    <div className="bg-white px-5 py-3 rounded-xl border border-slate-200 text-center font-bold text-slate-800 shadow-sm w-full md:w-auto">
                                                        <span className="text-xs text-emerald-500 uppercase tracking-widest block font-black">Step 3</span>
                                                        Solution / Action
                                                    </div>
                                                    <div className="text-slate-400 rotate-90 md:rotate-0">➔</div>
                                                    <div className="bg-white px-5 py-3 rounded-xl border border-slate-200 text-center font-bold text-slate-800 shadow-sm w-full md:w-auto">
                                                        <span className="text-xs text-blue-500 uppercase tracking-widest block font-black">Result</span>
                                                        New Cycle Begins
                                                    </div>
                                                </div>
                                            </div>

                                            <Ar>
                                                <strong>1. قواعد التحركات (Move Grammar):</strong> لا تسير الحبكة المسرحية في خط مستقيم ناعم، بل كدائرة مستمرة: تبدأ بـ (مشكلة) تتطلب حلاً، ولا يتم الحل إلا بوجود (عامل مساعد/محفز)، ليؤدي ذلك إلى (نتيجة/حل) تخلق بدورها مشكلة جديدة لتبدأ الدورة من جديد.
                                                <br/><strong>مثال تطبيقي:</strong> مشكلة إياجو هي شعوره بالظلم لعدم ترقيته وحبه المرفوض. المحفز كان "منديل ديدمونة" وسذاجة عطيل. النتيجة كانت تدمير عطيل وقتل ديدمونة، وهذا الحل خلق أزمة جديدة (اكتشاف جرائمه) لتبدأ الدورة مجدداً.
                                            </Ar>

                                            <div className="grid md:grid-cols-2 gap-6 mt-6">
                                                <div className="border border-slate-100 bg-slate-50/50 p-5 rounded-xl">
                                                    <strong className="text-slate-900 block mb-2 text-lg">Case Study: Iago's Plot</strong>
                                                    <ul className="list-disc pl-5 space-y-2 text-sm text-slate-600">
                                                        <li><strong>The Problem:</strong> Denied military promotion (Othello chose Cassio), alongside unrequited, unspoken love which deeply wounds his reputation-obsessed Elizabethan psyche.</li>
                                                        <li><strong>The Catalyst:</strong> Desdemona's dropped handkerchief combined with Othello's trusting naivety.</li>
                                                        <li><strong>The Solution:</strong> Manipulating Othello to murder Desdemona. However, this solution is not a final ending—it instantly triggers the next cycle of move grammar with new problems, catalysts, and eventual exposure.</li>
                                                    </ul>
                                                </div>
                                                <div className="border border-slate-100 bg-slate-50/50 p-5 rounded-xl">
                                                    <strong className="text-slate-900 block mb-2 text-lg">Cognitive Analysis on Stage</strong>
                                                    <p className="text-sm text-slate-600 mb-3">
                                                        This methodology analyzes everything that physically and psychologically occurs on stage to shape audience and character perception.
                                                    </p>
                                                    <ul className="list-disc pl-5 space-y-2 text-sm text-slate-600">
                                                        <li><strong>Theatrical Props & Light:</strong> The staging of light vs. darkness and imagery of life vs. death represent shifting moral boundaries.</li>
                                                        <li><strong>Control of Sight & Ear:</strong> In <em>Othello</em>, Iago is the ultimate stage-manager. He controls what Othello hears and physically shapes Othello's vision so that what Iago perceives is what Othello accepts as absolute reality.</li>
                                                    </ul>
                                                </div>
                                            </div>
                                            <Ar>
                                                <strong>التحليل الإدراكي/المعرفي (Cognitive Analysis):</strong> التركيز على ما يحدث فيزيائياً ونفسياً على خشبة المسرح وكيف يدرك الجمهور والشخصيات هذا الواقع. مثل استخدام الإضاءة، والظلام، والأهم: السيطرة الإدراكية كما فعل إياجو حين تحكم في عقل عطيل بالكامل، فصارت عيون وآذان عطيل ترى وتسمع فقط ما يريده إياجو لها أن تراه، ملغياً إدراكه الخاص.
                                            </Ar>
                                        </div>
                                    </div>

                                    {/* 2. Modern Drama & The Theater of Revolt */}
                                    <div className="bg-white rounded-[2rem] shadow-lg shadow-slate-200/50 p-6 md:p-10 border border-slate-100 relative group">
                                        <div className="flex items-start gap-4 mb-6">
                                            <div className="p-3 bg-indigo-50 text-indigo-700 rounded-2xl shrink-0">
                                                <Scale size={28} />
                                            </div>
                                            <div>
                                                <h3 className="text-2xl font-black text-slate-900">2. Modern Drama & The Theater of Revolt</h3>
                                                <p className="text-slate-500 text-sm font-bold uppercase tracking-wider mt-1">The Great Shift in Dramatic Tradition</p>
                                            </div>
                                        </div>

                                        <div className="space-y-6 text-slate-700 leading-relaxed text-base">
                                            <p>
                                                Modern drama marks an insurgent breakaway from classical traditions. The <strong>Theater of Revolt</strong> starts exactly where the classical <strong>Theater of Communion</strong> ends: at the threshold of spiritual collapse and total disillusionment.
                                            </p>

                                            <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm my-6">
                                                <div className="grid grid-cols-2 bg-slate-800 font-black text-sm text-white uppercase tracking-wide">
                                                    <div className="p-4 text-center border-r border-slate-700">The Theater of Communion (The Past)</div>
                                                    <div className="p-4 text-center">The Theater of Revolt (The Modern)</div>
                                                </div>
                                                <div className="grid grid-cols-2 text-sm border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                    <div className="p-5 border-r border-slate-100">
                                                        <strong className="block text-slate-800 mb-1">Dramatists:</strong> Sophocles, Shakespeare, Racine.
                                                    </div>
                                                    <div className="p-5">
                                                        <strong className="block text-slate-800 mb-1">Dramatists:</strong> Ibsen, Strindberg, Chekhov, Shaw, Brecht, Pirandello, O'Neill, Genet.
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 text-sm border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                    <div className="p-5 border-r border-slate-100">
                                                        <strong className="block text-slate-800 mb-1">Belief System:</strong> Enacts traditional myths before an audience of believers against the background of a coherent universe.
                                                    </div>
                                                    <div className="p-5">
                                                        <strong className="block text-slate-800 mb-1">Belief System:</strong> Enacts myths of rebellion before a dwindling number of spectators in a flux of vacancy, bafflement, and accident.
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 text-sm border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                    <div className="p-5 border-r border-slate-100">
                                                        <strong className="block text-slate-800 mb-1">Resolution:</strong> Offers structural or spiritual restoration (e.g., Denmark is restored after Hamlet's death).
                                                    </div>
                                                    <div className="p-5">
                                                        <strong className="block text-slate-800 mb-1">Resolution:</strong> No restoration or comfort. Bitter protest remains unresolved.
                                                    </div>
                                                </div>
                                            </div>

                                            <Ar>
                                                <strong>مسرح التمرد (الحديث) مقابل مسرح الشراكة الروحية (القديم):</strong><br/>
                                                - <strong>المسرح القديم:</strong> (مثل مسرح شكسبير وسوفوكليس) يعتمد على الإيمان، وجمهور يؤمن بالخرافات والنظام الكوني، وينتهي بتقديم "حل أو راحة" للمشاهد بعد المأساة.<br/>
                                                - <strong>مسرح التمرد الحديث:</strong> (مثل إبسن وستريندبرغ) يبدأ من نقطة النهاية والانهيار للمسرح القديم. هو مسرح الشك المطلق، والتمرد على القيم والمؤسسات البالية (دين، عائلة، مجتمع)، ولا يقدم نهايات مريحة أو حلولاً تطهيرية للجمهور.
                                            </Ar>

                                            <div className="bg-slate-50 border-l-4 border-indigo-500 rounded-r-xl p-5 my-6 italic text-slate-600 text-sm font-serif">
                                                "'Tis all in pieces, all coherence gone; All just supply, and all relation."
                                            </div>

                                            <div className="space-y-4">
                                                <h4 className="font-bold text-slate-900 text-lg">The Trajectory of Western Drama</h4>
                                                <p className="text-sm text-slate-600">
                                                    Classic drama naturally evolves along a trajectory arching from <strong>Belief ➔ Uncertainty ➔ Unbelief</strong>:
                                                </p>
                                                <ul className="list-disc pl-5 space-y-2 text-sm text-slate-600">
                                                    <li><strong>The Greek Precedent:</strong> Moved from the absolute piety of Aeschylus, to the tragic ambivalence of Sophocles, to the angry agnosticism of Euripides, and finally disintegrated into the spiritual indifference of Menander's New Comedy.</li>
                                                    <li><strong>The Western Precedent:</strong> Advanced from the absolute religious certainty of medieval mystery plays, to the deep doubts and hesitation of Stuart/Late Renaissance dramatists (Webster, Middleton, Shakespeare) whose tragic heroes peer into an empty sky.</li>
                                                </ul>
                                            </div>

                                            <div className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100 mt-6">
                                                <h4 className="font-bold text-indigo-900 text-lg mb-2">Three Categories of Revolt</h4>
                                                <div className="grid md:grid-cols-3 gap-4 text-sm text-slate-700">
                                                    <div className="bg-white p-4 rounded-xl border border-indigo-100/50 text-slate-700">
                                                        <strong className="text-indigo-800 block mb-1">1. Existential</strong>
                                                        Rebellion against the vacancy of existence, absence of God, and the meaningless absurdity of life.
                                                    </div>
                                                    <div className="bg-white p-4 rounded-xl border border-indigo-100/50 text-slate-700">
                                                        <strong className="text-indigo-800 block mb-1">2. Messianic</strong>
                                                        Rebellion against a silent, indifferent creator, replacing God with self-exalting ideals.
                                                    </div>
                                                    <div className="bg-white p-4 rounded-xl border border-indigo-100/50 text-slate-700">
                                                        <strong className="text-indigo-800 block mb-1">3. Social</strong>
                                                        Rebellion against political structures, social class institutions, and hypocritical conventions (e.g., Ibsen's <em>The Wild Duck</em>).
                                                    </div>
                                                </div>
                                                <Ar>
                                                    <strong>أنواع التمرد في المسرح الحديث:</strong> 1- تمرد وجودي (ضد عبثية الحياة). 2- تمرد خلاصي مسياني (تمرد الإنسان ليضع نفسه كإله/منقذ لنفسه). 3- تمرد اجتماعي (كما في مسرحية البطة البرية، ضد النفاق وهياكل المجتمع الزائفة).
                                                </Ar>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 3. Characteristic Features of Modern Drama */}
                                    <div className="bg-white rounded-[2rem] shadow-lg shadow-slate-200/50 p-6 md:p-10 border border-slate-100 relative group">
                                        <div className="flex items-start gap-4 mb-6">
                                            <div className="p-3 bg-rose-50 text-rose-700 rounded-2xl shrink-0">
                                                <Zap size={28} />
                                            </div>
                                            <div>
                                                <h3 className="text-2xl font-black text-slate-900">3. The 8 Core Features of Modern Drama</h3>
                                                <p className="text-slate-500 text-sm font-bold uppercase tracking-wider mt-1">Mnemonic Device: I.I.L.D.R.C.P.P.</p>
                                            </div>
                                        </div>

                                        <p className="text-slate-700 leading-relaxed text-base mb-6">
                                            Modern dramatists share key thematic signatures that expose the psychological, spiritual, and physical struggles of the modern individual.
                                        </p>

                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div className="space-y-4">
                                                <h4 className="font-bold text-slate-900 border-b pb-2">Theme A: The Individual's Internal State</h4>
                                                
                                                <div className="flex gap-4 items-start">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-700 shrink-0 text-xs">1</div>
                                                    <div className="text-sm">
                                                        <strong className="text-slate-900 block text-base">Individuality</strong>
                                                        Focuses heavily on the single person's psyche, inner aspirations, and emotions over the family or community. <em>Premise: If the individual's psyche is sick, the entire family and society are sick.</em>
                                                    </div>
                                                </div>

                                                <div className="flex gap-4 items-start">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-700 shrink-0 text-xs">2</div>
                                                    <div className="text-sm">
                                                        <strong className="text-slate-900 block text-base">Isolation</strong>
                                                        Modern tech devices, apps, and phones create physical and social barriers, isolating people from their immediate family and physical surroundings.
                                                    </div>
                                                </div>

                                                <div className="flex gap-4 items-start">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-700 shrink-0 text-xs">3</div>
                                                    <div className="text-sm">
                                                        <strong className="text-slate-900 block text-base">Loneliness</strong>
                                                        A persistent feeling of complete alienation, even when physically surrounded by crowds, dense communities, or apartment neighbors.
                                                    </div>
                                                </div>

                                                <div className="flex gap-4 items-start">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-700 shrink-0 text-xs">4</div>
                                                    <div className="text-sm">
                                                        <strong className="text-slate-900 block text-base">Despair (Leading to Suicide)</strong>
                                                        An inability to communicate or share secrets leaves modern man compressed, suffering, and ill-at-ease, driving characters to suicide.
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="space-y-4">
                                                <h4 className="font-bold text-slate-900 border-b pb-2">Theme B: External Interactions & Frameworks</h4>

                                                <div className="flex gap-4 items-start">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-700 shrink-0 text-xs">5</div>
                                                    <div className="text-sm">
                                                        <strong className="text-slate-900 block text-base">Lack of Communication</strong>
                                                        While communication technology has advanced rapidly, characters completely fail to share genuine, deep feelings, ideas, and concerns.
                                                    </div>
                                                </div>

                                                <div className="flex gap-4 items-start">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-700 shrink-0 text-xs">6</div>
                                                    <div className="text-sm">
                                                        <strong className="text-slate-900 block text-base">Religion</strong>
                                                        A persistent interest in religion. A clergyman is almost always featured—either as a positive force of guidance or as a critical figure of hypocrisy.
                                                    </div>
                                                </div>

                                                <div className="flex gap-4 items-start">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-700 shrink-0 text-xs">7</div>
                                                    <div className="text-sm">
                                                        <strong className="text-slate-900 block text-base">Interest in the Past</strong>
                                                        Modern writers look back to historical events, not for nostalgia, but to relate historical lessons to current dynamics and look forward to the future.
                                                    </div>
                                                </div>

                                                <div className="flex gap-4 items-start">
                                                    <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-700 shrink-0 text-xs">8</div>
                                                    <div className="text-sm">
                                                        <strong className="text-slate-900 block text-base">Psychoanalysis & Psychology</strong>
                                                        A strong focus on mental health, depression, and psychological trauma, emphasizing characters who desperately need therapeutic listening to heal.
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <Ar>
                                            <strong>السمات الثمانية للمسرح الحديث:</strong><br/>
                                            1. <strong>الفردية (Individuality):</strong> التركيز على الفرد ومشكلاته كمركز للكون (فإذا مرض الفرد، مرض المجتمع).<br/>
                                            2. <strong>الانعزال (Isolation):</strong> الانفصال المادي عن المحيط، والذي زاد بسبب التكنولوجيا الحديثة.<br/>
                                            3. <strong>الشعور بالوحدة (Loneliness):</strong> شعور داخلي قاتم بالغربة حتى وسط الزحام.<br/>
                                            4. <strong>اليأس المؤدي للانتحار (Despair):</strong> الضغط النفسي المتراكم من العزلة يدفع أبطال الدراما الحديثة لإنهاء حياتهم.<br/>
                                            5. <strong>انعدام التواصل (Lack of Communication):</strong> العجز التام عن التعبير عن المشاعر الحقيقية أو مشاركة الأسرار.<br/>
                                            6. <strong>الدين (Religion):</strong> تواجد شخصيات دينية كرجال دين (إما بشكل إيجابي أو سلبي منافق).<br/>
                                            7. <strong>الاهتمام بالماضي (Past):</strong> استخدام التاريخ لفهم الحاضر والتنبؤ بالمستقبل.<br/>
                                            8. <strong>التحليل النفسي (Psychoanalysis):</strong> التركيز المعمق على عقد الأبطال النفسية واحتياجهم لعلاج جذري بدلاً من الحلول السطحية.
                                        </Ar>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
